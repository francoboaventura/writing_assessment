let _arqBusca='';
const ARQ_LIMITE=20;
function _turmasComAluno(qn){ const ids=new Set(); S.alunos.forEach(a=>{ if(_normTxt(a.nome).includes(qn)) ids.add(a.turmaId); }); return ids; }
// Lista unificada de relatórios ENVIADOS (aula por turma + ficha por aluno), ordenada pela data de envio (mais recentes em cima).
function _arquivoItens(){
  const out=[];
  (S.relatorios||[]).forEach(r=>{
    if(!r.enviado) return;
    out.push({ tipo:'aula', id:r.id, ts:(r.enviadoTs||_ymdToTs(r.enviadoEm||r.data)), em:(r.enviadoEm||r.data),
      turmaId:r.turmaId, titulo:turmaNome(r.turmaId), dataAula:r.data, por:r.criadoPor||'' });
  });
  (S.alunos||[]).forEach(a=>{
    (Array.isArray(a.relatoriosEnviados)?a.relatoriosEnviados:[]).forEach(e=>{
      out.push({ tipo:'aluno', id:a.id+'@'+(e.ts||e.em), ts:(e.ts||_ymdToTs(e.em)), em:e.em,
        turmaId:a.turmaId, alunoId:a.id, titulo:a.nome, via:(e.via||''), por:(e.por||'') });
    });
  });
  out.sort((x,y)=>(y.ts||0)-(x.ts||0));
  const seen=new Set(); const dedup=[];
  out.forEach(it=>{ if(seen.has(it.id)) return; seen.add(it.id); dedup.push(it); });   // sem duplicidade
  return dedup;
}
function filtrarArquivo(busca){
  const q=(busca||'').trim(), qn=_normTxt(q);
  let rs=_arquivoItens();
  if(q){
    const turmasAluno=_turmasComAluno(qn);   // casa busca por nome de aluno nos relatórios de aula
    rs=rs.filter(it=>{
      const titulo=_normTxt(it.titulo);                       // turma (aula) ou nome (aluno)
      const nomeTurma=_normTxt(turmaNome(it.turmaId));
      const dataMatch=(it.em||'').includes(q) || brDate(it.em).includes(q)
        || (it.dataAula && (it.dataAula.includes(q) || brDate(it.dataAula).includes(q)));
      const alunoMatch=it.tipo==='aluno' ? titulo.includes(qn) : turmasAluno.has(it.turmaId);
      return titulo.includes(qn) || nomeTurma.includes(qn) || alunoMatch || dataMatch;
    });
  }
  return rs;
}
function renderArquivo(){
  const box=document.getElementById('arqHist'); if(!box) return;
  const todos=filtrarArquivo(_arqBusca);
  const buscando=!!(_arqBusca||'').trim();
  const rs=buscando ? todos : todos.slice(0,ARQ_LIMITE);
  const cnt=document.getElementById('arqCount');
  if(cnt) cnt.textContent = buscando
    ? (todos.length+' resultado(s)')
    : ('mostrando os '+rs.length+' mais recentes'+(todos.length>rs.length?(' · '+todos.length+' no total'):''));
  if(!rs.length){ box.innerHTML='<p class="hint">'+(buscando?'Nenhum relatório enviado encontrado.':'Nenhum relatório enviado ainda.')+'</p>'; return; }
  box.innerHTML=rs.map(it=>{
    const t=S.turmas.find(x=>x.id===it.turmaId)||{};
    if(it.tipo==='aluno'){
      const viaTxt=it.via==='email'?'e-mail':it.via==='whatsapp'?'WhatsApp':it.via==='pdf'?'PDF':'';
      const sub=[t.nome?esc(t.nome):'', viaTxt, it.por?esc(it.por):''].filter(Boolean).join(' · ');
      return `<div class="check"><span style="flex:1">${brDate(it.em)} · 📄 <b>${esc(it.titulo)}</b> <span class="pill" style="background:#eef4ff;color:var(--azul)">aluno</span>${sub?`<br><small class="hint">${sub}</small>`:''}</span>

function corpoRelatorioVip(vid){
  const al=S.vipAlunos.find(a=>a.id===vid); if(!al)return'';
  const aulas=S.aulasVip.filter(x=>x.vipId===vid).sort((a,b)=>a.data.localeCompare(b.data));
  const comp=aulas.filter(a=>!a.faltou); const compMin=comp.reduce((s,a)=>s+(+a.duracaoMin||0),0);
  const faltas=aulas.length-comp.length;
  let b=`Relatório de aulas VIP — ${al.nome}\n`;
  if(aulas.length) b+=`Período: ${brDate(aulas[0].data)} a ${brDate(aulas[aulas.length-1].data)}\n`;
  b+=`\n`+aulas.map(a=>`• ${brDate(a.data)} — ${a.tema?a.tema+': ':''}${a.descricao} (${fmtDur(a.duracaoMin)})${a.faltou?' — NÃO COMPARECEU':''}`).join('\n');
  b+=`\n\nAulas com presença: ${comp.length} (${fmtDur(compMin)})${faltas?` · Faltas: ${faltas}`:''}\n`;
  b+=`\n${(S.config&&S.config.assinatura)||ASSINATURA_PADRAO}`;

}

function corpoRelatorioAluno(alunoId,turmaId,de,ate){

  const aluno=S.alunos.find(a=>a.id===alunoId), turma=S.turmas.find(t=>t.id===turmaId);
  const faltas=faltasDoAluno(alunoId,turmaId).filter(inRange), mat=materialDoAluno(alunoId,turmaId).filter(inRange);
  const temas=temasNaoFeitosDoAluno(alunoId,turmaId).filter(t=>inRange(t.data)), coms=comentariosDoAluno(alunoId).filter(c=>inRange(c.data));
  const atrasos=atrasosDoAluno(alunoId,turmaId).filter(inRange), saidas=saidasCedoDoAluno(alunoId,turmaId).filter(inRange);
  const peso=pesoFalta(turmaId);
  const baseF=Number(aluno.faltasRetro)||0, totalF=baseF+faltas.length;
  let txt=`RELATÓRIO DO ALUNO\n${aluno.nome}\nTurma: ${turma.nome}${turma.professor?' · Prof. '+turma.professor:''}\nPeríodo: ${de?brDate(de):'início'} a ${ate?brDate(ate):'hoje'}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  txt+=`\n📋 FALTAS (${totalF}${peso===2?` — turma com 2 aulas por encontro`:''})\n`;
  if(baseF) txt+=`• ${baseF} falta(s) retroativas (registro manual)\n`;
  if(faltas.length) faltas.forEach(d=>{ txt+=`• ${brDate(d)} — conteúdo da aula: ${resumoAulaDoDia(turmaId,d)}\n`; });
  if(!totalF) txt+=`• Nenhuma falta registrada.\n`;
  txt+=`\n⏰ CHEGOU ATRASADO (${atrasos.length})\n`;
  if(atrasos.length) atrasos.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🚪 SAIU MAIS CEDO (${saidas.length})\n`;
  if(saidas.length) saidas.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum registro.\n`;
  txt+=`\n📚 TEMAS DE CASA NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(t=>{ txt+=`• ${brDate(t.data)} — ${t.descricao}${t.origem==='plano'?' (do plano de aula)':' (extra)'} — ${t.status==='parcial'?'parcialmente feito':'não feito'}\n`; }); else txt+=`• Nenhum registro.\n`;
  const wrsR=(S.writings||[]).filter(w=>w.alunoId===alunoId && inRange(w.data)).sort((x,y)=>x.data.localeCompare(y.data));
  txt+=`\n📝 WRITINGS (${wrsR.length})\n`;
  if(wrsR.length) wrsR.forEach(w=>{ const bt=(w.subscales||Object.keys(w.bands||{})).map(k=>WR_LBL(k)+' '+(w.bands[k]!=null?w.bands[k]:'—')).join(', '); txt+=`• ${brDate(w.data)} — ${w.levelLabel||w.level||''}${w.taskLabel?(' · '+w.taskLabel):''} — Geral ${w.overall_band!=null?w.overall_band:'—'}/5 (${bt})${w.togethere_band?(' · '+w.togethere_band):''}\n`; }); else txt+=`• Nenhum.\n`;
  txt+=`\n💬 COMENTÁRIOS (${coms.length})\n`;
  if(coms.length) coms.forEach(c=>{ txt+=`• ${brDate(c.data)} (${c.autor}): ${c.texto}\n`; }); else txt+=`• Nenhum comentário.\n`;
  txt+=`\n—\nTogethere · inglês para chegar lá`;
  return txt;
}

  agendado:{lbl:'Agendado', bg:'#eafaf0', cor:'#1a8a4a'},

function apoioMotivosTxt(m){ return (m||[]).map(k=>{const o=MOTIVOS_APOIO.find(x=>x.k===k);return o?o.t:k;}); }
function apoioAlunoNome(ap){ const a=S.alunos.find(a=>a.id===ap.alunoId); return a?a.nome:(ap.alunoNome||'—'); }
function apoioAlunoEmail(ap){ const a=S.alunos.find(a=>a.id===ap.alunoId); return a?(a.email||'').trim():''; }

// indicações que exigem AÇÃO do perfil atual (para o badge do menu)
function apoioBadge(){
  const aps=(S.apoios||[]).filter(a=>!a.excluido);
  if(S.perfil==='direcao')    return aps.filter(a=>a.status==='pendente').length;
  if(S.perfil==='secretaria') return aps.filter(a=>a.status==='aprovado').length;
  return 0;
}
// o professor só enxerga as indicações que ele mesmo criou; direção/secretaria veem todas
function apoiosVisiveis(){
  const aps=(S.apoios||[]).filter(a=>!a.excluido);
  if(S.perfil==='professor'){
    const u=S.usuarios.find(u=>u.nome===S.usuario);
    return aps.filter(a=>a.criadoPor===S.usuario || (u&&u.ensina&&a.professor===u.ensina));
  }
  return aps;
}

function decidirApoio(id,decisao){
  const ap=S.apoios.find(a=>a.id===id); if(!ap) return;
  const parecer=(document.getElementById('apParecer').value||'').trim();
  if(decisao==='recusado' && !parecer) return toast('Explique o motivo da recusa no parecer');

  ap.decididoPor=S.usuario; ap.decididoEm=Date.now(); ap.atualizadoEm=Date.now();

/* ===== Ficha do Aluno (b49) ===== */
let _fichaAlunoId=null, _fichaDe='', _fichaAte='';
function _fichaTurmasDoAluno(alunoId){
  const ids={};
  const a=(S.alunos||[]).find(x=>x.id===alunoId);
  if(a && a.turmaId) ids[a.turmaId]=true;
  (S.presencas||[]).forEach(p=>{ if(p.registros && (alunoId in p.registros)) ids[p.turmaId]=true; });
  (S.turmas||[]).forEach(t=>{ if((t.alunosSnapshot||[]).some(s=>s.id===alunoId)) ids[t.id]=true; });
  return Object.keys(ids).map(id=>(S.turmas||[]).find(t=>t.id===id)).filter(Boolean);
}
function testesDoAluno(alunoId){
  return (S.testes||[]).filter(t=>t.notas && (alunoId in t.notas))
    .map(t=>({data:t.data,turmaId:t.turmaId,numero:t.numero,nota:t.notas[alunoId]}))
    .sort((a,b)=>(a.data||'').localeCompare(b.data||''));
}
function _fichaAulas(alunoId, turmaIds, de, ate){
  const inRange=d=>(!de||d>=de)&&(!ate||d<=ate);
  const out=[];
  (S.presencas||[]).forEach(p=>{
    if(turmaIds.indexOf(p.turmaId)<0) return;
    if(!p.registros || !(alunoId in p.registros)) return;
    if(!inRange(p.data)) return;
    const rel=(S.relatorios||[]).find(r=>r.turmaId===p.turmaId && r.data===p.data);
    out.push({data:p.data, turmaId:p.turmaId, status:p.registros[alunoId],
      cancelada:p.statusAula==='cancelada', transferida:p.statusAula==='transferida',
      resumo:(rel&&rel.corpo)||resumoAulaDoDia(p.turmaId,p.data)});
  });
  return out.sort((a,b)=>b.data.localeCompare(a.data));
}
function _fichaStreakFaltas(alunoId,turmaId){
  const dois=temAula2(turmaId);
  const sess=(S.presencas||[]).filter(p=>p.turmaId===turmaId && _aulaConta(p) && p.registros && (alunoId in p.registros)).sort((x,y)=>x.data.localeCompare(y.data));
  const seq=[]; sess.forEach(p=>{ const s1=p.registros[alunoId]; if(p.registros2){seq.push(s1);seq.push(p.registros2[alunoId]||'presente');} else if(dois){seq.push(s1);seq.push(s1);} else seq.push(s1); });
  let streak=0; for(let i=seq.length-1;i>=0;i--){ if(seq[i]==='falta')streak++; else break; }
  return streak;
}
function corpoFichaAluno(alunoId, de, ate){
  const a=(S.alunos||[]).find(x=>x.id===alunoId); if(!a) return '';
  const turmas=_fichaTurmasDoAluno(alunoId);
  const inRange=d=>(!de||d>=de)&&(!ate||d<=ate);
  const tatual=(S.turmas||[]).find(t=>t.id===a.turmaId);
  let txt=`FICHA DO ALUNO\n${a.nome}\n`;
  if(tatual) txt+=`Turma atual: ${tatual.nome}${tatual.professor?' · Prof. '+tatual.professor:''}\n`;
  txt+=`Período: ${de?brDate(de):'início'} a ${ate?brDate(ate):'hoje'}\nGerado em ${brDate(hoje())} por ${S.usuario}\n`;
  let totalF=Number(a.faltasRetro)||0;
  turmas.forEach(t=>{ totalF+=faltasDoAluno(alunoId,t.id).filter(inRange).length; });
  const aulas=_fichaAulas(alunoId, turmas.map(t=>t.id), de, ate);
  const pres=aulas.filter(x=>x.status==='presente'&&!x.cancelada&&!x.transferida).length;
  txt+=`\n📊 FREQUÊNCIA\n• Presenças: ${pres}\n• Faltas: ${totalF}${(Number(a.faltasRetro)||0)?` (inclui ${a.faltasRetro} retroativa(s))`:''}\n`;
  txt+=`\n📅 AULAS (${aulas.length})\n`;
  if(aulas.length) aulas.forEach(x=>{
    const tag=x.cancelada?'aula cancelada':x.transferida?'aula transferida':(x.status==='falta'?'FALTOU':'presente');
    txt+=`• ${brDate(x.data)} — ${tag}${(!x.cancelada&&!x.transferida)?` — ${x.resumo}`:''}\n`;
  }); else txt+=`• Nenhuma aula no período.\n`;
  let temas=[]; turmas.forEach(t=>{ temas=temas.concat(temasNaoFeitosDoAluno(alunoId,t.id).filter(z=>inRange(z.data))); });
  txt+=`\n📚 TEMAS NÃO FEITOS / PARCIAIS (${temas.length})\n`;
  if(temas.length) temas.forEach(z=>{ txt+=`• ${brDate(z.data)} — ${z.descricao} — ${z.status==='parcial'?'parcial':'não feito'}\n`; }); else txt+=`• Nenhum.\n`;
  let mat=[]; turmas.forEach(t=>{ mat=mat.concat(materialDoAluno(alunoId,t.id).filter(inRange)); });
  txt+=`\n🎒 MATERIAL NÃO TRAZIDO (${mat.length})\n`;
  if(mat.length) mat.sort().forEach(d=>{ txt+=`• ${brDate(d)}\n`; }); else txt+=`• Nenhum.\n`;
  const tst=testesDoAluno(alunoId).filter(z=>inRange(z.data));
  txt+=`\n📝 TESTES (${tst.length})\n`;
  if(tst.length) tst.forEach(z=>{ const tn=((S.turmas||[]).find(t=>t.id===z.turmaId)||{}).nome||''; txt+=`• ${brDate(z.data)}${z.numero?(' · teste '+z.numero):''} — nota ${z.nota}${tn?(' ('+tn+')'):''}\n`; }); else txt+=`• Nenhum registro.\n`;
  const wrsF=(S.writings||[]).filter(w=>w.alunoId===alunoId && inRange(w.data)).sort((x,y)=>x.data.localeCompare(y.data));

function _registrarEnvioFicha(a, via, corpo){
  if(!a || ehProfessor()) return;
  a.relatoriosEnviados = Array.isArray(a.relatoriosEnviados) ? a.relatoriosEnviados : [];
  const em=hoje();
  let reg=a.relatoriosEnviados.find(r=>r.em===em);
  if(reg){ reg.ts=Date.now(); reg.via=via; reg.por=S.usuario; reg.de=_fichaDe||''; reg.ate=_fichaAte||''; if(corpo!=null) reg.corpo=corpo; }
  else { a.relatoriosEnviados.push({ts:Date.now(), em, por:S.usuario, via, de:_fichaDe||'', ate:_fichaAte||'', corpo:(corpo!=null?corpo:'')}); }
  if(a.relatoriosEnviados.length>200) a.relatoriosEnviados=a.relatoriosEnviados.slice(-200);
  a.atualizadoEm=Date.now();   // carimbo para a sincronização entre aparelhos
}

  }).join('')+'</div>':'<p class="hint">Nenhum.</p>';
  // material + comentários
  h+=`<h3 style="margin:18px 0 6px">🎒 Material não trazido (${mat.length})</h3>`;
  h+=mat.length?'<div class="card" style="padding:10px 12px"><div class="hint">'+mat.sort().map(d=>brDate(d)).join(' · ')+'</div></div>':'<p class="hint">Nenhum.</p>';
  h+=`<h3 style="margin:18px 0 6px">💬 Comentários (${coms.length})</h3>`;
  h+=coms.length?'<div class="card" style="padding:10px 12px">'+coms.map(c=>`<div class="hint" style="border-top:1px solid var(--linha);padding:6px 0"><b>${brDate(c.data)}</b> (${escAttr(c.autor||'—')}): ${escAttr(c.texto||'')}</div>`).join('')+'</div>':'<p class="hint">Nenhum.</p>';
  // ações
  h+=`<div class="card" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:16px">
    ${podeEnviar?`<button class="btn" id="fcEnviar" onclick="enviarFichaResponsavel()">✉️ Enviar ao responsável</button>`:''}
    <button class="btn ghost" onclick="copiarFicha()">📋 Copiar (WhatsApp)</button>
    <button class="btn ghost" onclick="imprimirFicha()">🖨️ Imprimir / PDF</button>
  </div>`;
  v.innerHTML=h;
};

function addTurma(){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  if(ehProfessor())return toast('Sem permissão');
  const nome=document.getElementById('nT').value.trim();
  if(!nome)return toast('Dê um nome à turma');
  const dias=[...document.querySelectorAll('.nDia:checked')].map(c=>+c.value).sort((a,b)=>a-b);
  if(!dias.length)return toast('Selecione ao menos um dia de aula');
  const hor=(document.getElementById('nHor').value||'').trim();
  const cefr=(document.getElementById('nC')||{}).value||cefrFromNome(nome);
  const t={id:uid(),nome,nivel:document.getElementById('nN').value,cefr,horario:hor,dias,vezesSemana:dias.length};
  if(S.perfil==='professor'){const u=S.usuarios.find(u=>u.nome===S.usuario);t.professor=u&&u.ensina;}
  S.turmas.push(t);
  save();VIEWS.turmas();toast('Turma criada');
}
let _fSeg='', _fPer='', _fDia='', _fProf='', _filtroAberto=false;
function toggleFiltroTurma(){ _filtroAberto=!_filtroAberto; renderTurmaList(); }
const PERIODOS=[['manha','Manhã'],['tarde','Tarde'],['tardinha','Tardinha'],['noite','Noite']];
function _minHHMM(s){ const m=String(s||'').match(/(\d{1,2}):(\d{2})/); return m? (+m[1]*60 + +m[2]) : null; }
function _horaIniTurma(t){ const m=String((t&&t.horario)||'').match(/(\d{1,2}):(\d{2})/g); if(m&&m.length){ const p=m[0].split(':'); return +p[0]*60 + +p[1]; } return null; }
function podeVerTodos(){ return S.perfil==='direcao'||S.perfil==='secretaria'; }
function periodoTurma(t){ const s=_horaIniTurma(t); if(s==null)return ''; if(s<720)return 'manha'; if(s<1020)return 'tarde'; if(s<1140)return 'tardinha'; return 'noite'; }
function turmaPassaFiltro(t){
  if(_fSeg && t.nivel!==_fSeg) return false;
  if(_fPer && periodoTurma(t)!==_fPer) return false;
  if(_fDia && diasTurmaLabel(t)!==_fDia) return false;
  if(_fProf && _normTxt(t.professor||'')!==_normTxt(_fProf)) return false;
  return true;
}
function _filtroTurmaAtivo(){ return _fSeg||_fPer||_fDia||_fProf; }
function setFiltroTurma(campo,val){ if(campo==='seg')_fSeg=val; else if(campo==='per')_fPer=val; else if(campo==='dia')_fDia=val; else if(campo==='prof')_fProf=val; renderTurmaList(); }
function limparFiltrosTurma(){ _fSeg=_fPer=_fDia=_fProf=''; renderTurmaList(); }
function renderFiltrosTurma(base){
  const ativos=[_fSeg,_fPer,_fDia,_fProf].filter(Boolean).length;
  if(!_filtroAberto){   // recolhido: lista aparece como antes, com um botão discreto
    let resumo='';
    if(ativos){
      const partes=[]; if(_fSeg)partes.push(_fSeg); if(_fPer)partes.push((PERIODOS.find(p=>p[0]===_fPer)||[])[1]||_fPer); if(_fDia)partes.push(_fDia); if(_fProf)partes.push(_fProf);
      resumo=` <span class="hint">${partes.join(' · ')}</span> <button class="btn ghost sm" onclick="limparFiltrosTurma()">limpar</button>`;
    }
    return `<div style="margin-bottom:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <button class="btn ghost sm" onclick="toggleFiltroTurma()">🔎 Filtrar${ativos?` (${ativos})`:''}</button>${resumo}</div>`;
  }
  const segs=[...new Set(base.map(t=>t.nivel).filter(Boolean))].sort();
  const dias=[...new Set(base.map(t=>diasTurmaLabel(t)).filter(Boolean))].sort();
  const profs=[...new Set(base.map(t=>t.professor).filter(Boolean))].sort();
  const opt=(val,cur,lbl)=>`<option value="${escAttr(val)}" ${cur===val?'selected':''}>${escAttr(lbl)}</option>`;
  const sel=(campo,cur,ph,items)=>`<select onchange="setFiltroTurma('${campo}',this.value)" style="flex:1;min-width:130px">${opt('',cur,ph)}${items.map(it=>opt(it[0],cur,it[1])).join('')}</select>`;
  return `<div class="card" style="padding:12px 14px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <b>Filtrar turmas e alunos</b>
      <button class="btn ghost sm" onclick="toggleFiltroTurma()">ocultar ▲</button>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      ${sel('seg',_fSeg,'Todos os segmentos',segs.map(s=>[s,s]))}
      ${sel('per',_fPer,'Todos os horários',PERIODOS.filter(p=>base.some(t=>periodoTurma(t)===p[0])))}
      ${sel('dia',_fDia,'Todos os dias',dias.map(d=>[d,d]))}
      ${sel('prof',_fProf,'Todos os professores',profs.map(p=>[p,p]))}
      ${_filtroTurmaAtivo()?`<button class="btn ghost sm" onclick="limparFiltrosTurma()">limpar</button>`:''}
    </div></div>`;
}
function renderTurmaList(){
  const list=document.getElementById('turmaList');
  let ts=turmasVisiveis();
  const base=ts.slice();
  if(!base.length){list.innerHTML='<div class="card empty"><div class="big">👥</div>Nenhuma turma. Crie a primeira!</div>';return;}
  const bar = podeVerTodos()? renderFiltrosTurma(base) : '';
  if(podeVerTodos()) ts=ts.filter(turmaPassaFiltro);
  const f=_normTxt(_buscaAluno||'').trim();
  if(f){   // modo busca: lista achatada de alunos que batem (respeitando os filtros)
    const res=[];
    ts.forEach(t=>alunosDa(t.id).forEach(a=>{ if(_normTxt(a.nome).includes(f)) res.push({a,t}); }));
    list.innerHTML = bar + (res.length
      ? `<div class="card"><h3>${res.length} aluno(s) encontrado(s)</h3>`+
        res.map(r=>`<div class="check"><span style="flex:1">${r.a.nome} <span class="pill">${r.t.nome}</span></span>
          <button class="btn ghost sm" onclick="abrirTurma('${r.t.id}')">🏫 Turma</button>
          <button class="btn ghost sm" onclick="abrirFicha('${r.a.id}')">📇 Ficha</button>
          ${(ehProfessor()||soLeitura())?'':`<button class="btn ghost sm" style="color:var(--vermelho)" onclick="delAluno('${r.a.id}')">remover</button>`}</div>`).join('')+`</div>`
      : `<div class="card empty"><div class="big">🔎</div>Nenhum aluno encontrado para “${_buscaAluno}”${_filtroTurmaAtivo()?' com esses filtros':''}.</div>`);
    return;
  }
  if(!ts.length){ list.innerHTML = bar + '<div class="card empty"><div class="big">🔎</div>Nenhuma turma com esses filtros.</div>'; return; }
  list.innerHTML = bar + ts.map(t=>{
    const als=alunosDa(t.id);
    const pend=pendenciasDaTurmaParaMim(t.id);
    const selo=pend.length?`<span class="pill" style="background:#fdeaea;color:var(--vermelho)" title="Pendências nesta turma">⚠️ ${pend.length}</span>`:'';
    const prof=t.professor?` · Prof. ${t.professor}`:'';
    const hor=t.horario?` · ${t.horario}`:'';
    const freq=` · ${diasTurmaLabel(t)||((t.vezesSemana===1)?'1x/sem':'2x/sem')}${t.vezesSemana===1?' (falta dupla)':''}`;
    return `<div class="card" style="cursor:pointer" onclick="abrirTurma('${t.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="flex:1"><h3 style="margin:0">${t.nome} ${nivelTag(t.nivel)}${t.cefr?` <span class="tag teens">${t.cefr}</span>`:''} ${selo}</h3>
          <p class="hint" style="margin:4px 0 0">${als.length} aluno(s)${prof}${hor}${freq}</p></div>
        <span style="font-size:1.7rem;color:var(--azul);line-height:1">›</span>
      </div></div>`;
  }).join('');
}

function exportarBackup(){
  const dados=JSON.stringify(Object.assign({},S,{usuario:null,perfil:null}));
  const blob=new Blob([dados],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup-togethere-'+hoje()+'.json';
  document.body.appendChild(a); a.click();
  setTimeout(()=>{URL.revokeObjectURL(a.href); a.remove();},200);

function importarBackup(input){
  const f=input.files&&input.files[0]; if(!f){return;}
  const r=new FileReader();
  r.onload=function(){
    let obj;
    try{ obj=JSON.parse(r.result); }catch(e){ toast('Arquivo inválido (não é um backup válido)'); return; }
    if(!obj || !obj.usuarios || !obj.alunos){ toast('Arquivo não parece um backup do app'); return; }
    if(!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Deseja continuar?')) return;
    S=migrar(obj); S.usuario=null; S.perfil=null;
    localStorage.setItem(KEY, JSON.stringify(S));
    toast('Restaurando…');
    cloudPut(true).then(function(){ location.reload(); });
  };
  r.readAsText(f); input.value='';
}

  kids:{label:'KIDS', niveis:['Pré A1','Pré A1+','A1','A1+']},
  junior:{label:'JUNIOR', niveis:['A1','A1+','A2','A2+']},

};

/* ===== Varredura de duplicidades (b44) ===== */
function _normTxt(s){ return (s||'').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/\s+/g,' ').trim(); }
function _normNomeAluno(s){ return _normTxt(s); }
function _normNomeTurma(s){ return _normTxt(s).replace(/\([^)]*\)/g,'').replace(/[^a-z0-9+]+/g,''); }
function _refsDaTurma(tid){
  const c={alunos:0,presencas:0,planos:0,temas:0,testes:0,material:0,relatorios:0};
  (S.alunos||[]).forEach(a=>{ if(a.turmaId===tid) c.alunos++; });
  ['presencas','planos','temas','testes','material','relatorios'].forEach(col=>{ (S[col]||[]).forEach(r=>{ if(r&&r.turmaId===tid) c[col]++; }); });
  return c;
}
function _turmaNomePorId(tid){ const t=(S.turmas||[]).find(x=>x.id===tid); return t?t.nome:'(turma inexistente)'; }
function escanearDuplicidades(){
  const turmas=S.turmas||[], alunos=S.alunos||[];
  const tg={};
  turmas.forEach(t=>{ const nk=_normNomeTurma(t.nome); if(!nk) return; const k=nk+'|'+((t.dias||[]).slice().sort((x,y)=>x-y).join(',')); (tg[k]=tg[k]||[]).push(t); });
  const turmasDup=Object.values(tg).filter(g=>g.length>1);
  const ag={};
  alunos.forEach(a=>{ if(a.arquivado) return; const k=_normNomeAluno(a.nome); if(!k) return; (ag[k]=ag[k]||[]).push(a); });
  const alunosDup=Object.values(ag).filter(g=>g.length>1);
  const idsT=new Set(turmas.map(t=>t.id));
  const cols=['presencas','material','temas','testes','planos','relatorios'];
  const orfaos={};
  cols.forEach(c=>{ const arr=(S[c]||[]).filter(r=>r&&r.turmaId && !idsT.has(r.turmaId)); if(arr.length) orfaos[c]=arr; });
  const alunosOrfaos=alunos.filter(a=>a.turmaId && !idsT.has(a.turmaId));
  return {turmasDup, alunosDup, orfaos, alunosOrfaos};
}
function dupDelAluno(id){
  if(ehProfessor()) return toast('Sem permissão');
  const a=(S.alunos||[]).find(x=>x.id===id); if(!a) return;
  if(!confirm('Apagar o aluno duplicado "'+a.nome+'"?\n\nIsto remove SOMENTE este registro. A outra cópia continua no app.')) return;
  S.alunos=(S.alunos||[]).filter(x=>x.id!==id); marcarExcluido('alunos',id);
  save(); VIEWS.dupes(); toast('Aluno duplicado removido');
}
function dupDelTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  const r=_refsDaTurma(id);
  const temReg=r.alunos||r.presencas||r.planos||r.temas||r.testes||r.material||r.relatorios;
  let msg='Apagar a turma duplicada "'+t.nome+'"?';
  if(temReg){
    msg+='\n\nEsta turma ainda tem:\n• '+r.alunos+' aluno(s)\n• '+r.presencas+' chamada(s)\n• '+r.planos+' plano(s) · '+r.temas+' tema(s) · '+r.testes+' teste(s)\n• '+r.relatorios+' relatório(s)\n\nTUDO isso será apagado junto. Não dá para desfazer.\n\nDica: apague a turma ANTIGA (a que não tem o "(2026)" ou tem menos registros).';
  }
  if(!confirm(msg)) return;
  S.turmas=(S.turmas||[]).filter(x=>x.id!==id); marcarExcluido('turmas',id);
  (S.alunos||[]).filter(a=>a.turmaId===id).forEach(a=>marcarExcluido('alunos',a.id));
  S.alunos=(S.alunos||[]).filter(a=>a.turmaId!==id);
  ['presencas','planos','temas','testes','material','relatorios'].forEach(col=>{
    (S[col]||[]).filter(rr=>rr&&rr.turmaId===id).forEach(rr=>marcarExcluido(col,rr.id));
    S[col]=(S[col]||[]).filter(rr=>!(rr&&rr.turmaId===id));
  });
  save(); montarNav(); VIEWS.dupes(); toast('Turma duplicada removida');
}
function dupDelOrfao(col,id){
  if(ehProfessor()) return toast('Sem permissão');
  if(!confirm('Apagar este registro órfão?\n\nEle pertence a uma turma que não existe mais no app.')) return;
  S[col]=(S[col]||[]).filter(r=>!(r&&r.id===id)); marcarExcluido(col,id);
  save(); VIEWS.dupes(); toast('Registro órfão removido');
}

        </div>`;
      });
      h+='</div>';

  // ALUNOS
  if(nA){

/* ===== Ciclo de vida da turma (b45) ===== */
const TSTATUS={aberta:{lbl:'ABERTA',cor:'#1a8a4a',bg:'#eafaf0'},formacao:{lbl:'EM FORMAÇÃO',cor:'#b88600',bg:'#fff8e0'},encerrada:{lbl:'ENCERRADA',cor:'#888',bg:'#eeeeee'}};
let _amBusca='';
function turmaStatus(t){ if(!t) return 'aberta'; return t.status || (t.arquivada?'encerrada':'aberta'); }
function turmaTrancada(tid){ const t=(S.turmas||[]).find(x=>x.id===tid); return turmaStatus(t)==='encerrada'; }
function statusPill(t){ const s=TSTATUS[turmaStatus(t)]||TSTATUS.aberta; return `<span class="pill" style="background:${s.bg};color:${s.cor}">${s.lbl}</span>`; }
function encerrarTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  if(turmaStatus(t)==='encerrada') return toast('Esta turma já está encerrada');
  const als=(S.alunos||[]).filter(a=>a.turmaId===id && !a.arquivado);
  if(!confirm('Encerrar a turma "'+t.nome+'"?\n\nEla vai para o ARQUIVO MORTO guardando os '+als.length+' aluno(s) atuais. Depois de encerrada, NADA nela poderá ser editado.\n\nOs alunos continuam no app e podem ser rematriculados em outra turma pelo "+ Aluno".')) return;
  t.alunosSnapshot=als.map(a=>({id:a.id,nome:a.nome}));
  t.status='encerrada'; t.arquivada=true; t.encerradaEm=hoje();
  if(painelTurma===id) painelTurma=null;
  save(); montarNav(); if(rota==='gturmas') VIEWS.gturmas(); toast('Turma encerrada e arquivada');
}
function iniciarTurma(id){
  if(ehProfessor()) return toast('Sem permissão');
  const t=(S.turmas||[]).find(x=>x.id===id); if(!t) return;
  t.status='aberta'; t.arquivada=false;
  save(); montarNav(); if(rota==='gturmas') VIEWS.gturmas(); toast('Turma aberta');
}

function reusarAluno(aid,turmaId){
  if(ehProfessor()) return toast('Sem permissão');
  if(turmaTrancada(turmaId)) return toast('Turma encerrada');

  const antiga=a.turmaId;
  if(antiga===turmaId){ fechar(); return toast('Este aluno já está nesta turma'); }
  if(antiga && !turmaTrancada(antiga)){
    if(!confirm(a.nome+' está na turma "'+_turmaNomePorId(antiga)+'". Mover para esta turma?')) return;
  }
  a.turmaId=turmaId; if(a.arquivado) a.arquivado=false;

function criarAlunoNovo(turmaId){

  if(exato){ if(!confirm('Já existe "'+exato.nome+'" no app (turma: '+_turmaNomePorId(exato.turmaId)+').\n\nCriar mesmo assim um aluno novo? Isso pode gerar duplicidade.')) return; }

      <p class="hint" style="margin:8px 0 0;color:#aaa">🔒 Arquivo morto — somente leitura.</p></div>`;
  }).join('');
}
function setAmBusca(v){ _amBusca=v; renderArquivoMorto(); }

/* ---- Aniversariantes da semana (pop-up) ---- */
function aniversariantesSemana(){
  const hoje=new Date(); hoje.setHours(0,0,0,0); const res=[];
  let ids;
  if(S.perfil==='professor'){ const u=S.usuarios.find(x=>x.nome===S.usuario); ids=new Set(S.turmas.filter(t=>!t.arquivada && t.professor===(u&&u.ensina)).map(t=>t.id)); }
  else { ids=new Set(S.turmas.filter(t=>!t.arquivada).map(t=>t.id)); }
  (S.alunos||[]).forEach(a=>{
    if(a.arquivado || !a.nascimento || !ids.has(a.turmaId)) return;
    const p=String(a.nascimento).split('-').map(Number); if(p.length<3||!p[1]||!p[2]) return;
    const yy=p[0],mm=p[1],dd=p[2];
    for(let i=0;i<7;i++){ const d=new Date(hoje); d.setDate(hoje.getDate()+i);
      if(d.getMonth()+1===mm && d.getDate()===dd){ const t=S.turmas.find(x=>x.id===a.turmaId);
        res.push({nome:a.nome, turma:t?t.nome:'', dia:new Date(d), faz:d.getFullYear()-yy}); break; }
    }
  });
  res.sort((a,b)=>a.dia-b.dia);
  return res;
}

}

(async function boot(){
  const av=document.getElementById('appVer'); if(av) av.textContent=APP_VERSAO;
  _iniciarFilaSync();                       // fila de sincronização offline (reenvia ao voltar a conexão)
  // existe sessão guardada neste aparelho?
  let tk=null,tuser=null,tperfil=null;
  try{ tk=localStorage.getItem(TKEY); tuser=localStorage.getItem(UKEY); tperfil=localStorage.getItem(PKEY); }catch(e){}
  if(tk && tuser && tperfil){
    CLOUD_TOKEN=tk;
    const lp=document.getElementById('loginPanel'); if(lp) lp.innerHTML='<p class="hint" style="text-align:center">Reconectando…</p>';
    const res=await cloudGet(8000);
    if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
      let temPend=false; try{ temPend=!!localStorage.getItem(PEND_KEY); }catch(e){}
      let nova=migrar(res.state);
      if(temPend){                           // havia edições offline não enviadas → MESCLA (local vence), não perde
        let loc=null; try{ loc=JSON.parse(localStorage.getItem(KEY)); }catch(e){}
        if(loc){ nova=mergeEstados(nova, migrar(loc)); _pendenteSync=true; }
      }
      S=nova;
      try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){}
      marcarSync(_pendenteSync?'...':'ok');
    } else if(res.auth){
      // token expirado/cancelado → limpa a sessão e pede login
      CLOUD_TOKEN=null;
      try{ localStorage.removeItem(TKEY); localStorage.removeItem(UKEY); localStorage.removeItem(PKEY); }catch(e){}
      S.usuario=null; S.perfil=null; renderLogin(); return;
    } else {
      try{ if(localStorage.getItem(PEND_KEY)) _pendenteSync=true; }catch(e){}
      marcarSync('off');                     // offline → entra com o estado local (NUNCA sobrescreve a nuvem)
    }
    const u=(S.usuarios||[]).find(x=>x.nome===tuser) || {nome:tuser, perfil:tperfil, ensina:null};
    S.usuario=u.nome; S.perfil=tperfil;
    aplicarLogin(u);
    if(_pendenteSync) setTimeout(flushSync,1200);   // sobe o que ficou pendente do offline
    return;
  }
  // sem sessão → tela de login
  S.usuario=null; S.perfil=null;
  renderLogin();
})();

/* PWA: registra o service worker (offline + instalável) */
function mostrarAtualizacao(){
  if(document.getElementById('updBanner')) return;
  var b=document.createElement('div');
  b.id='updBanner';
  b.style.cssText='position:fixed;left:12px;right:12px;bottom:12px;z-index:99999;background:var(--azul);color:#fff;border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 26px rgba(0,0,0,.28);font-size:.92rem;max-width:560px;margin:0 auto';
  b.innerHTML='<span style="flex:1">✨ <b>Nova versão disponível.</b></span>'+
    '<button onclick="location.reload()" style="background:var(--amarelo);color:#1a1a1a;border:none;border-radius:10px;padding:8px 14px;font-weight:700;cursor:pointer">Atualizar</button>'+
    '<button onclick="var e=document.getElementById(\'updBanner\');if(e)e.remove()" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,.5);border-radius:10px;padding:8px 10px;cursor:pointer">Depois</button>';
  document.body.appendChild(b);
}
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      try{ reg.update(); }catch(e){}
      setInterval(function(){ try{ reg.update(); }catch(e){} }, 60*60*1000);   // checa de hora em hora (sessões abertas o dia todo)
      reg.addEventListener('updatefound', function(){
        var nw=reg.installing; if(!nw) return;
        nw.addEventListener('statechange', function(){
          if(nw.state==='installed' && navigator.serviceWorker.controller){ mostrarAtualizacao(); }  // 'installed' + já há controlador = atualização (não 1ª instalação)
        });
      });
    }).catch(function(){});
  });
}

function semanaEscola(){

  const ns=Object.keys(weeks).map(Number).sort((a,b)=>a-b); if(!ns.length) return 1;

  if(hoje<weeks[ns[0]].ini) return ns[0];

}

  const HTML = `

  function injetarCSS(){ if(document.getElementById('wa-style')) return; const s=document.createElement('style'); s.id='wa-style'; s.textContent=CSS; document.head.appendChild(s); }
  function ajustarAltura(){ const t=q('wa-texto'); if(!t) return; t.style.height='auto'; const alvo=Math.max(360, Math.min(t.scrollHeight+6, Math.round(window.innerHeight*1.3))); t.style.height=alvo+'px'; }
  function nivelAtual(){ return LEVELS.levels.find(l=>l.id===q('wa-nivel').value); }
  function montarTarefas(){ const l=nivelAtual(); if(!l) return; q('wa-tarefa').innerHTML=l.tasks.map(t=>{ const faixa=t.max_words?`${t.min_words}–${t.max_words} palavras`:`mín. ${t.min_words} palavras`; return `<option value="${t.id}" data-min="${t.min_words}" data-free="${!!t.free}">${t.label} · ${faixa}</option>`; }).join(''); q('wa-tarefa').onchange=aoTrocarTarefa; aoTrocarTarefa(); }
  function aoTrocarTarefa(){ const opt=q('wa-tarefa').selectedOptions[0]; const l=nivelAtual(); const aviso=q('wa-aviso-nivel'); if(opt) q('wa-minimo').textContent=opt.dataset.min; if(opt && opt.dataset.free==='true'){ aviso.hidden=false; aviso.className='wa-hint warn'; aviso.textContent='Texto livre: o motor aplica a régua de '+l.label+' a um texto fora do formato do exame. Descreva bem no enunciado o gênero e para quem o aluno escreveu — é isso que sustenta a nota de Communicative Achievement.'; } else if(l && l.calibrated===false){ aviso.hidden=false; aviso.className='wa-hint warn'; aviso.textContent='Motor não calibrado neste nível — revisão do professor é obrigatória.'; } else { aviso.hidden=true; } }
  function ligarDrop(zona,input,multi){ zona.onclick=()=>input.click(); zona.ondragover=e=>{e.preventDefault();zona.classList.add('over');}; zona.ondragleave=()=>zona.classList.remove('over'); zona.ondrop=e=>{e.preventDefault();zona.classList.remove('over');receber([...e.dataTransfer.files],multi);}; input.onchange=()=>receber([...input.files],multi); }
  async function receber(arquivos,multi){ if(!arquivos.length) return; const zona=multi?q('wa-drop'):q('wa-drop-tarefa'); const btn=multi?q('wa-btn-ocr'):q('wa-btn-ocr-tarefa'); const originais=zona.innerHTML; btn.disabled=true; zona.innerHTML=`<strong>Preparando ${arquivos.length} ${arquivos.length>1?'imagens':'imagem'}…</strong>`; try{ const prontas=[]; for(const f of arquivos) prontas.push({nome:f.name,url:await prepararImagem(f)}); if(multi){ paginas=paginas.concat(prontas); zona.innerHTML=originais; renderPaginas(); } else { imgTarefa=prontas[0].url; const kb=Math.round(imgTarefa.length*0.75/1024); zona.innerHTML=`<strong>${prontas[0].nome}</strong><br><small>pronta · ${kb} KB</small><img src="${imgTarefa}" alt="">`; } btn.disabled=false; }catch(e){ zona.innerHTML=`<strong>Não consegui ler a imagem</strong><br><small>${e.message}<br>Tente JPEG ou PNG.</small>`; } }
  function renderPaginas(){ const alvo=q('wa-paginas'); if(!paginas.length){ alvo.innerHTML=''; q('wa-btn-ocr').disabled=true; return; } alvo.innerHTML=paginas.map((p,i)=>`<div class="wa-pag"><img src="${p.url}" alt=""><span class="wa-num">${i+1}</span><button type="button" class="wa-x" data-i="${i}" title="Remover">×</button></div>`).join('')+`<div class="wa-pagmsg">${paginas.length} página${paginas.length>1?'s':''}, nesta ordem</div>`; alvo.querySelectorAll('.wa-x').forEach(b=>b.onclick=()=>{ paginas.splice(+b.dataset.i,1); renderPaginas(); }); q('wa-btn-ocr').disabled=false; }
  async function prepararImagem(f){ let blob=f; if(/heic|heif/i.test(f.type)||/\.hei[cf]$/i.test(f.name)) blob=await heicParaJpeg(f); return reduzirParaJpeg(blob); }
  async function heicParaJpeg(f){ if(!window.heic2any){ await new Promise((ok,erro)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/heic2any/0.0.4/heic2any.min.js'; s.onload=ok; s.onerror=()=>erro(new Error('Falha ao carregar o conversor de HEIC.')); document.head.appendChild(s); }); } return window.heic2any({blob:f,toType:'image/jpeg',quality:QUALIDADE}); }
  function reduzirParaJpeg(blob){ return new Promise((ok,erro)=>{ const url=URL.createObjectURL(blob); const img=new Image(); img.onload=()=>{ URL.revokeObjectURL(url); const escala=Math.min(1,MAX_LADO/Math.max(img.width,img.height)); const c=document.createElement('canvas'); c.width=Math.round(img.width*escala); c.height=Math.round(img.height*escala); const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,c.width,c.height); ctx.drawImage(img,0,0,c.width,c.height); ok(c.toDataURL('image/jpeg',QUALIDADE)); }; img.onerror=()=>{ URL.revokeObjectURL(url); erro(new Error('Formato de imagem não suportado pelo navegador.')); }; img.src=url; }); }
  async function transcrever({botao,rotulo,corpo,aoChegar}){ const b=q(botao); b.disabled=true; b.textContent='Transcrevendo…'; try{ const r=await fetch(CFG.apiUrl.replace(/\/$/,'')+'/transcribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(corpo())}); const d=await r.json(); if(!r.ok) throw new Error(d.error||'HTTP '+r.status); aoChegar(d.text); }catch(e){ toast('Falha na transcrição: '+e.message); } finally{ b.disabled=false; b.textContent=rotulo; } }
  function _turmasWA(){ try{ return (typeof turmasVisiveis==='function'?turmasVisiveis():(S.turmas||[])).filter(t=>!t.arquivada); }catch(e){ return (S.turmas||[]).filter(t=>!t.arquivada); } }
  function _vipWA(){ const gestor=(S.perfil==='direcao'||S.perfil==='secretaria'); const meu=(typeof _meuEnsina==='function')?_meuEnsina():''; return (S.vipAlunos||[]).filter(v=>!v.arquivado && (gestor || v.professor===meu)).sort((a,b)=>a.nome.localeCompare(b.nome)); }
  function montarTurmasAlunos(){ const tsel=q('wa-turma'); if(!tsel) return; const ts=_turmasWA(); let html=ts.map(t=>`<option value="${t.id}">${esc(t.nome)}</option>`).join(''); if(_vipWA().length) html+=`<option value="__vip__">👑 Alunos VIP</option>`; html+=`<option value="__avulso__">✏️ Correção avulsa (não salva)</option>`; tsel.innerHTML = html || '<option value="">(sem turmas)</option>'; montarAlunos(); }
  function montarAlunos(){ const tsel=q('wa-turma'), asel=q('wa-aluno-sel'); if(!asel) return; const tid=tsel?tsel.value:'';
    if(tid==='__avulso__'){ asel.innerHTML='<option value="">— sem aluno · não fica registrada —</option>'; return; }
    let als;
    if(tid==='__vip__'){ als=_vipWA(); }
    else { try{ als=(typeof alunosDa==='function'?alunosDa(tid):(S.alunos||[]).filter(a=>a.turmaId===tid&&!a.arquivado)); }catch(e){ als=(S.alunos||[]).filter(a=>a.turmaId===tid); } als=als.slice().sort((a,b)=>a.nome.localeCompare(b.nome)); }
    asel.innerHTML = als.length? als.map(a=>`<option value="${a.id}">${esc(a.nome)}</option>`).join('') : '<option value="">(sem alunos)</option>';
  }
  function renderHist(){
    const box=q('wa-hist'); if(!box) return;
    const alunoId=((q('wa-aluno-sel')||{}).value)||'';
    const ws=(S.writings||[]).filter(w=>w.alunoId===alunoId).sort((a,b)=>b.data.localeCompare(a.data)||((b.atualizadoEm||0)-(a.atualizadoEm||0)));
    if(!alunoId || !ws.length){ box.innerHTML=''; return; }
    box.innerHTML=`<label style="margin-top:14px">Writings salvos deste aluno</label>`+ws.map(w=>{
      const ver = w.full ? `<button type="button" class="wa-btn wa-btn-ghost wa-ver" onclick="WA.verRelatorio('${w.id}')">ver relatório</button>` : `<span class="wa-op" style="font-size:12px">(só as notas)</span>`;
      return `<div class="wa-hist-item"><span style="flex:1;min-width:150px">${brDate(w.data)} · ${esc(w.levelLabel||w.level||'')} — <b>Geral ${w.overall_band!=null?w.overall_band:'—'}/5</b>${w.togethere_band?(' · '+esc(w.togethere_band)):''}</span>${ver}</div>`;
    }).join('');
  }
  function verRelatorio(id){
    const w=(S.writings||[]).find(x=>x.id===id);
    if(!w) return toast('Registro não encontrado');
    if(!w.full) return toast('Este registro foi salvo antes desta atualização — só as notas estão disponíveis.');
    injetarCSS();
    const aluno=(S.alunos||[]).find(a=>a.id===w.alunoId) || (S.vipAlunos||[]).find(v=>v.id===w.alunoId) || {};
    modal(`<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><h3 style="flex:1;margin:0">📝 Relatório de writing</h3><button class="close" onclick="fechar()">×</button></div>
      <p class="hint" style="margin:0 0 10px">${esc(aluno.nome||'')}${aluno.nome?' · ':''}${esc(w.levelLabel||w.level||'')}${w.taskLabel?(' · '+esc(w.taskLabel)):''} · ${brDate(w.data)}${w.criadoPor?(' · por '+esc(w.criadoPor)):''}</p>
      ${w.enunciado?`<div class="hint" style="margin:0 0 8px"><b>Enunciado:</b> ${esc(w.enunciado)}</div>`:''}
      ${w.texto?`<details style="margin:0 0 10px"><summary class="hint" style="cursor:pointer">Ver o texto do aluno</summary><div class="wa-root"><div class="wa-resumo" style="white-space:pre-wrap;margin-top:8px">${esc(w.texto)}</div></div></details>`:''}
      <div class="wa-root"><div id="wa-modalpainel"></div></div>`);
    render(w.full, 'wa-modalpainel');
  }
  function salvarWriting(alunoId, turmaId, d, texto, enunciado){
    if(!alunoId) return;
    const nivelSel=q('wa-nivel'), tarefaSel=q('wa-tarefa');
    const levelLabel=((nivelSel.selectedOptions[0]||{}).textContent||d.level||'').trim();
    const taskLabel=((tarefaSel.selectedOptions[0]||{}).textContent||'').trim();
    const subs=d.subscales||['content','organisation','language'];
    const bands={}; subs.forEach(k=>{ bands[k]=(d[k]&&d[k].band!=null)?d[k].band:null; });
    const ehVip = (turmaId==='__vip__') || !!((S.vipAlunos||[]).find(v=>v.id===alunoId));
    const tId = ehVip ? '' : turmaId;
    S.writings=S.writings||[];
    S.writings.push({ id:uid(), alunoId, turmaId:tId, vip:ehVip, data:hoje(), level:d.level||nivelSel.value, levelLabel, task:tarefaSel.value||'', taskLabel, subscales:subs, bands, overall_band:(d.overall_band!=null?d.overall_band:null), togethere_band:d.togethere_band||'', cefr_result:d.cefr_result||'', word_count:(d.word_count!=null?d.word_count:null), full:d, texto:(texto||''), enunciado:(enunciado||''), criadoPor:S.usuario, atualizadoEm:Date.now() });
    save();                              // grava e sincroniza: notas para a ficha + relatório completo para resgatar depois
    renderHist();
    toast('Avaliação salva ✓ — notas na ficha e relatório guardado');
  }
  async function avaliar(e){
    e.preventDefault();
    const text=q('wa-texto').value.trim();
    if(!text) return toast('Cole o texto do aluno, ou transcreva a foto primeiro.');
    const alunoId=((q('wa-aluno-sel')||{}).value)||'';
    const turmaId=((q('wa-turma')||{}).value)||'';
    const _pessoa= alunoId ? ((S.alunos||[]).find(a=>a.id===alunoId) || (S.vipAlunos||[]).find(v=>v.id===alunoId)) : null;
    const alunoNome= _pessoa ? (_pessoa.nome||'') : '';
    carregando('Avaliando contra a escala Cambridge…');
    try{
      const r=await fetch(CFG.apiUrl.replace(/\/$/,'')+'/assess',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({student:alunoNome, level:q('wa-nivel').value, task_part:q('wa-tarefa').value, task_prompt:q('wa-enunciado').value, text})});
      const d=await r.json(); if(!r.ok) throw new Error(d.error||'HTTP '+r.status);
      render(d);
      if(alunoId) salvarWriting(alunoId, turmaId, d, text, ((q('wa-enunciado')||{}).value)||'');
      else if(turmaId==='__avulso__') toast('Correção avulsa — não fica registrada em nenhum aluno.');
      else toast('Avaliado. Selecione turma e aluno para salvar as notas e o relatório.');

(function(){
  const MIN=15, MS=MIN*60000; let _last=Date.now(), _tmr=null;
  function _logado(){ return !!(typeof S!=='undefined' && S && S.usuario); }
  function _arm(){ clearTimeout(_tmr); if(!_logado()) return; _tmr=setTimeout(_check, Math.max(1000, MS-(Date.now()-_last))); }
  function _check(){ if(_logado() && Date.now()-_last>=MS){ try{ toast('Sessão encerrada por inatividade'); }catch(e){} try{ logout(); }catch(e){} } else { _arm(); } }
  function _bump(){ _last=Date.now(); _arm(); }
  ['click','keydown','touchstart','pointerdown','scroll'].forEach(function(ev){ try{ document.addEventListener(ev,_bump,{passive:true}); }catch(e){} });
  let _mv=0; try{ document.addEventListener('mousemove',function(){ const n=Date.now(); if(n-_mv>2000){ _mv=n; _bump(); } },{passive:true}); }catch(e){}
  try{ document.addEventListener('visibilitychange',function(){ if(!document.hidden) _check(); }); }catch(e){}
  try{ window.addEventListener('focus',_check); }catch(e){}
  _bump();
})();

/* =========================================================================
   FORMAÇÃO (b89) — metodologia Togethere viva dentro do app
   • Biblioteca de tópicos (conteúdo editável pela direção, mora em S.formacao)
   • Percurso do professor: cada tópico "vence" depois de N meses → volta a
     aparecer como "revisar" (é o que impede o módulo de morrer)
   • Painel da direção: quem está em dia, quem precisa revisar
   • Sessões de formação: a direção registra um treinamento e marca todos os
     participantes de uma vez
   ARMAZENAMENTO: S.formacao / S.formacaoReg / S.formacaoSessoes (em MERGE_COLS,
   com atualizadoEm e marcarExcluido — sincroniza entre aparelhos).
   ========================================================================= */

function _fmProfs(){ return (S.usuarios||[]).filter(u=>u.ensina).sort((a,b)=>a.nome.localeCompare(b.nome)); }

function _fmMesesMs(m){ return (m||6)*30.44*24*3600*1000; }
function _fmUltimo(topicoId, usuario){

  (S.formacaoReg||[]).forEach(r=>{ if(r.topicoId===topicoId && r.usuario===usuario && (r.ts||0)>t) t=r.ts||0; });

  return {k:'ok', ts};
}

    if(m){ if(lista!=='ul'){ fim(); out+='<ul style="margin:6px 0 6px 20px">'; lista='ul'; } out+=`<li style="margin:3px 0">${m[1]}</li>`; return; }
    m=s.match(/^\d+[.)]\s+(.*)$/);
    if(m){ if(lista!=='ol'){ fim(); out+='<ol style="margin:6px 0 6px 20px">'; lista='ol'; } out+=`<li style="margin:3px 0">${m[1]}</li>`; return; }
    fim(); out+=`<p style="margin:6px 0">${s}</p>`;
  });
  fim();
  return out.replace(/\*\*(.+?)\*\*/g,'<b>$1</b>');
}

    emoji:(document.getElementById('fmEmoji').value||'📘').trim(),

    conteudo:document.getElementById('fmCont').value||'',

function fmSalvarSessao(){
  const topicos=[...document.querySelectorAll('.fsTop:checked')].map(c=>c.value);
  const participantes=[...document.querySelectorAll('.fsPart:checked')].map(c=>c.value);
  if(!topicos.length) return toast('Marque ao menos um tópico');
  if(!participantes.length) return toast('Marque ao menos um participante');
  const data=document.getElementById('fsData').value||hoje();
  const titulo=(document.getElementById('fsTit').value||'').trim()||'Sessão de formação';
  const notas=(document.getElementById('fsNotas').value||'').trim();
  const sid=uid(), ts=_ymdToTs(data);
  S.formacaoSessoes=S.formacaoSessoes||[];
  S.formacaoSessoes.push({id:sid, data, titulo, topicos, participantes, notas, por:S.usuario, criadoEm:Date.now(), atualizadoEm:Date.now()});
  S.formacaoReg=S.formacaoReg||[];
  participantes.forEach(p=>topicos.forEach(tid=>{
    S.formacaoReg.push({id:uid(), topicoId:tid, usuario:p, ts, tipo:'sessao', sessaoId:sid, atualizadoEm:Date.now()});
  }));
  save(); fechar(); _fmAba='sessoes'; VIEWS.formacao(); montarNav();
  toast(participantes.length+' professor(es) marcados em '+topicos.length+' tópico(s)');
}

  const s=(S.formacaoSessoes||[]).find(x=>x.id===id); if(!s) return;

  modal(`<h3 style="margin-bottom:4px">📌 ${esc(s.titulo)} <button class="close" onclick="fechar()">×</button></h3>

function fmExcluirSessao(id){
  if(!confirm('Excluir esta sessão? As marcações feitas por ela também serão removidas.')) return;
  S.formacaoSessoes=(S.formacaoSessoes||[]).filter(x=>x.id!==id);

}

## Focus

   conteudo:`A Togethere é mais do que uma escola de inglês: é um espaço de aprendizagem para pessoas de todas as idades com um objetivo em comum — dominar o inglês para estudo, trabalho, viagem ou realização pessoal. Nossa filosofia parte de uma ideia simples: o aprendizado acontece quando a base teórica encontra a aplicação prática, num ambiente engajador e acolhedor.

## Nossa abordagem
Comunicação é o coração do aprendizado. Combinamos abordagens tradicionais e modernas para criar um ambiente plural, o que nos permite:
- criar aulas dinâmicas e focadas em comunicação com sentido
- adaptar o método ao processo de cada aluno
- desenvolver o crescimento individual e coletivo
- aplicar práticas que fortalecem associação e memorização
- manter espontaneidade e leveza no processo

## Os cinco princípios basais
1. Jornada personalizada — a metodologia é estruturada, mas cada aluno tem um caminho; ajustamos a abordagem ao perfil e às necessidades dele.
2. Foco na comunicação — a língua cumpre seu papel quando é usada de verdade. A aula presencial existe para maximizar interação autêntica.
3. Padrões e materiais modernos — currículo alinhado ao CEFR, com material atual e referência internacional.
4. Acompanhamento colaborativo — aluno, professor e coordenação trabalham juntos: definir metas, criar estratégias, acompanhar por avaliação contínua e ajustar a rota.
5. Metodologia flexível — ambiente leve e compreensivo, combinando conceitos tradicionais e modernos conforme a necessidade da turma.`},

   resumo:'As quatro frentes de responsabilidade de quem dá aula aqui.',
   conteudo:`## 1. Entrega do currículo
- Planejar e conduzir aulas que atendam a estilos e necessidades diferentes, com objetivos, atividades e avaliação claros.
- Desenvolver materiais interativos, adequados à idade e ao nível.
- Garantir que toda atividade esteja alinhada aos objetivos do currículo, revisando a estratégia conforme o progresso da turma.

## 2. Avaliação do aluno
- Aplicar avaliações formativas e somativas com regularidade, formais e informais.
- Usar instrumentos que meçam de fato as seis habilidades: speaking, writing, listening, reading, grammar e vocabulary.
- Analisar os dados junto com a direção acadêmica e criar intervenções para quem precisa de apoio ou de desafio maior.

## 3. Gestão da sala
- Criar e manter um ambiente positivo e inclusivo, com rotinas e combinados claros desde o primeiro dia.
- Aplicar manejo de comportamento justo e consistente, com reforço positivo e consequências claras.
- Alinhar com os colegas para que o padrão de sala seja o mesmo em toda a escola.

## 4. Desenvolvimento profissional
- Participar das formações, oficinas e treinamentos da escola.
- Manter-se atualizado em metodologia, tecnologia educacional e boas práticas de ESL/EFL.
- Aprender junto: reuniões, observação entre pares e troca de materiais.`},

  {id:'fm-4fs-praticas', emoji:'🛠️', ordem:80, titulo:'Os 4 Fs na prática — dicas por etapa',
   resumo:'O que fazer em aula para cada um dos quatro Fs.',
   conteudo:`Regra de planejamento: se a aula é divertida mas fraca em algum dos 4 Fs, o aprendizado fica raso. Uma boa aula Togethere constrói os quatro de propósito.

## Focus — direcionar a atenção
- Comece com o objetivo em uma frase ("ao final da aula, você consegue…") e retome no fechamento.
- Modele primeiro e guie a percepção: peça que ouçam ou leiam procurando UM detalhe específico.
- Instruções curtas e em etapas: dê um passo, cheque o entendimento, então libere a atividade.
- Use "resets" de atenção quando a energia cair: uma pergunta-checkpoint, um reagrupamento rápido.
- Reduza estímulos concorrentes: menos poluição no quadro e nos slides, principalmente nos níveis baixos.

## Frequency — manter a exposição
- Planeje o caminho de volta de cada conteúdo: ele reaparece na mesma aula, na próxima e mais adiante na unidade.
- Comece a aula com uma retomada curta que reutilize a língua anterior.
- Exija que o conteúdo antigo entre nas tarefas novas (ex.: usar 2 ou 3 estruturas da semana passada no speaking de hoje).
- Revisão com propósito: ela apoia o objetivo de hoje, não é sorteio de curiosidades.
- Fuja da armadilha do conteúdo novo toda aula.

## Fixation — fixar pela recuperação
- Inclua ao menos um momento de recuperação sem consulta em toda aula, nem que sejam 30 a 60 segundos.
- Avance na progressão: controlado, semicontrolado, comunicativo.
- Use micro-writing e micro-speaking: produção curta, com correção e nova tentativa.
- Varie o contexto: mesma estrutura, outra situação, outra pessoa, outro tempo.
- Prefira poucos ciclos de prática bem-feitos a muitas atividades rasas.

## Feedback — alimentar a melhora
- Priorize 1 ou 2 pontos de maior impacto por tarefa, não todos os erros.
- Ajuste o tempo: imediato para forma e pronúncia; adiado em tarefas de fluência.
- Use ciclos de retry e upgrade: o aluno tenta de novo com a forma corrigida.
- Mantenha a linguagem de correção constante ("tenta de novo — olha o verbo").
- Equilibre precisão e incentivo: confirme o que funcionou, depois aponte a melhora.

## Perguntas de planejamento
1. Focus: no que o aluno vai prestar atenção primeiro, e como deixo o alvo evidente?
2. Frequency: quando esse conteúdo reaparece (hoje, na próxima, mais adiante)?
3. Fixation: quando o aluno vai recuperar de memória e produzir sem consulta?
4. Feedback: o que vou corrigir, e como o aluno tenta de novo?`},

  {id:'fm-teorias', emoji:'📖', ordem:90, titulo:'Teorias de ensino de línguas',
   resumo:'As principais correntes, com prós e limites de cada uma.',
   conteudo:`Não defendemos uma teoria única. Conhecer as várias permite escolher com critério o que serve para cada turma e objetivo.

## Behaviorismo
Princípio: a língua se aprende por formação de hábito e reforço.
- A favor: eficaz para padrões e estruturas básicas; método claro; bom para iniciantes e crianças.
- Limites: ignora a criatividade e os processos cognitivos; pode virar mecânico.

## Inatismo
Princípio: existe uma capacidade inata de adquirir língua.
- A favor: explica a aquisição rápida na infância; apoia imersão.
- Limites: subestima o ensino explícito; difícil em sala formal; menos eficaz com adultos.

## Construtivismo
Princípio: o aluno constrói o próprio entendimento pela experiência.
- A favor: aprendizagem ativa, autonomia, pensamento crítico.
- Limites: leva tempo; exige mediação habilidosa.

## Interacionismo social
Princípio: a língua se aprende na interação social.
- A favor: comunicação autêntica, competência cultural, colaboração.
- Limites: desafiador em turma monolíngue; exige boa gestão de grupos.

## Inteligências múltiplas
Princípio: pessoas diferentes aprendem por caminhos diferentes.
- A favor: acolhe estilos variados; ensino inclusivo.
- Limites: complexo de implementar; exige recursos.

## Teoria cognitiva
Princípio: aprender língua envolve processos mentais ativos.
- A favor: compreensão acima da memorização; aprendizagem significativa.
- Limites: pode ser abstrato; exige andaimes bem postos.

## Grammar Translation
Princípio: a língua se aprende por análise e tradução.
- A favor: desenvolve análise; foco em precisão; útil no acadêmico.
- Limites: pouca comunicação; pode desmotivar; não gera fluência.

## Hipótese da interação
Princípio: a aquisição ocorre na interação com sentido.
- A favor: uso natural da língua; motivação.
- Limites: exige monitoramento; imprevisível.`},

  {id:'fm-metodologias', emoji:'🧪', ordem:100, titulo:'Metodologias de ensino',
   resumo:'CLT, TBLT, CLIL, TPR e as demais — o que são e quando usar.',
   conteudo:`## Communicative Language Teaching (CLT)
Foco em comunicação com sentido, material autêntico e integração das habilidades.
Na prática: role-plays, information gap, projetos.
Ganho: competência comunicativa e preparo para o uso real.

## Task-Based Language Teaching (TBLT)
Aprender realizando tarefas com objetivo real.
Na prática: resolução de problemas, projetos, simulações.
Ganho: aprendizagem ativa e integração de várias áreas da língua.

## CLIL — conteúdo e língua integrados
Ensinar conteúdo de outra área em inglês.
Na prática: vocabulário específico, projetos interdisciplinares.
Ganho: contexto com significado e linguagem acadêmica.

## Community Language Learning (CLL)
Centrado no aluno, com o professor como facilitador.
Na prática: rodas de conversa, resolução em grupo, ensino entre pares.
Ganho: reduz ansiedade e constrói confiança.

## Direct Method
Sem uso da língua materna, vocabulário do dia a dia, gramática indutiva.
Na prática: imagens, mímica, pergunta e resposta.
Ganho: desenvolve escuta e o hábito de pensar em inglês.

## Audiolingualismo
Prática de padrões e drills, foco no oral.
Na prática: repetição, substituição, memorização de diálogos.
Ganho: automatismo e pronúncia.

## Total Physical Response (TPR)
Movimento associado à compreensão, com produção oral adiada.
Na prática: comandos com ação, atividades de movimento.
Ganho: engaja vários sentidos e reduz o estresse; ótimo para iniciantes.

## Suggestopedia
Ambiente confortável, música e sugestão positiva.
Na prática: música ao fundo, disposição acolhedora, role-play com outra identidade.
Ganho: reduz ansiedade e favorece a memória.`},

  {id:'fm-integracao', emoji:'🔗', ordem:110, titulo:'Como a Togethere combina as abordagens',
   resumo:'Nenhuma teoria dá conta sozinha — como a gente mistura, e por quê.',
   conteudo:`Nenhuma teoria ou metodologia isolada responde a tudo. Nossa abordagem é eclética, mas com princípio: escolhemos e combinamos conforme o objetivo da aula, o perfil da turma e o contexto.

## Aprendizagem centrada na comunicação
- Interacionismo social: a língua se aprende interagindo de verdade.
- CLT: foco no uso funcional, não só no conhecimento estrutural.
- Task-Based: tarefas autênticas que espelham a vida real.

## Caminhos personalizados
- Inteligências múltiplas: reconhecer e atender estilos diferentes.
- Construtivismo: o aluno constrói sentido; o professor media.
- Teoria cognitiva: a progressão entre níveis respeita os processos de aquisição.

## Padrões modernos
- CLIL: integrar inglês a conteúdos relevantes de outras áreas.
- Hipótese da interação: atividades que geram negociação de sentido.

## Flexibilidade
- Direct Method: quando a exposição direta e autêntica ajuda.
- TPR: sobretudo com os pequenos e nas fases iniciais.
- Suggestopedia: para criar clima leve e reduzir ansiedade.

O objetivo é aproveitar a força de cada abordagem e compensar os limites de todas.`},

  {id:'fm-cefr', emoji:'📊', ordem:120, titulo:'Descritores CEFR — o que o aluno consegue fazer',
   resumo:'De Pré-A1 a C2, em linguagem de can do.',
   conteudo:`O CEFR é a base do nosso currículo e da avaliação. Use os descritores para definir objetivos, criar atividades no nível certo, dar feedback específico e escrever relatórios.

## Pré-A1
- Fala: frases curtas sobre si; cumprimentos; responde a perguntas pessoais simples ditas devagar.
- Escrita: dados pessoais; copia palavras; frases isoladas.
- Escuta: instruções básicas ditas devagar; palavras familiares.
- Leitura: nomes, palavras e frases muito simples em avisos.

## A1
- Fala: interage de forma simples se o outro repetir ou reformular; pergunta e responde sobre necessidades imediatas.
- Escrita: frases isoladas; um cartão-postal simples; preenche formulários.
- Escuta: fala muito lenta e articulada, com pausas.
- Leitura: nomes, palavras e frases muito simples; mensagens curtas.

## A2
- Fala: descreve seu entorno e sua rotina; troca informação em tarefas simples.
- Escrita: bilhetes curtos; frases ligadas por conectores simples; cartas pessoais breves.
- Escuta: pega o ponto principal de mensagens curtas e claras.
- Leitura: textos curtos com vocabulário frequente; encontra informação específica.

## B1
- Fala: lida com a maioria das situações de viagem; entra em conversa sobre temas familiares; conecta ideias para narrar experiências.
- Escrita: textos conectados sobre temas conhecidos; cartas pessoais com experiências e impressões.
- Escuta: pontos principais de fala padrão clara; programas de TV e rádio sobre atualidades.
- Leitura: textos com linguagem cotidiana; argumentos claros sobre temas familiares.

## B2
- Fala: fluência e espontaneidade suficientes para interagir com nativos; explica um ponto de vista com prós e contras.
- Escrita: textos claros e detalhados; ensaios e relatórios argumentando.
- Escuta: palestras e fala longa; maior parte de noticiários e filmes em dialeto padrão.
- Leitura: artigos e reportagens sobre problemas contemporâneos; prosa literária.

## C1
- Fala: expressa-se com fluência e espontaneidade, sem procurar palavras; usa a língua com flexibilidade para fins sociais e profissionais.
- Escrita: textos bem estruturados sobre temas complexos; escolhe o estilo conforme o leitor.
- Escuta: fala longa mesmo sem estrutura clara; programas e filmes sem grande esforço.
- Leitura: textos longos e complexos; artigos especializados fora da própria área.

## C2
- Fala: participa sem esforço de qualquer conversa; expressa-se com precisão e fluidez.
- Escrita: textos fluidos no estilo adequado; relatórios e artigos complexos; resumos e resenhas.
- Escuta: qualquer tipo de fala, inclusive discussões técnicas e uso regional.
- Leitura: praticamente qualquer texto, com percepção de estilo e sentido implícito.

## Como usar
1. No planejamento: definir objetivo, escolher atividade e material do nível.
2. Na avaliação: criar tarefas, avaliar desempenho, escrever relatórios.
3. No feedback: apontar o que melhorar, definir metas alcançáveis, celebrar o avanço.
4. No apoio: dar andaimes, diferenciar a instrução, estimular autonomia.

Trate os descritores como referência flexível, não como camisa de força.`},

  {id:'fm-niveis', emoji:'🪜', ordem:130, titulo:'Sistema de níveis Togethere',
   resumo:'Segmentos por idade e a nomenclatura correta dos níveis.',
   conteudo:`Cada nível dura um ano. O nome do nível combina o CEFR com o segmento — por exemplo, A2 JUNIOR ou B1+ TEENS. Use sempre o nome completo.

## LITTLE ONES — 3 a 5 anos
- LITTLE ONES STARTER, LITTLE ONES A, LITTLE ONES B
- Todos servem como porta de entrada; foco no desenvolvimento infantil e em atividades adequadas à idade.

## KIDS — 6 a 9 anos
- Pré A1 KIDS, Pré A1+ KIDS, A1 KIDS, A1+ KIDS
- Introdução ao estudo estruturado; construção de base; letramento adequado à idade.

## JUNIOR — 10 a 12 anos
- A1 JUNIOR, A1+ JUNIOR, A2 JUNIOR, A2+ JUNIOR
- Estruturas mais complexas; habilidades acadêmicas; todas as competências.

## TEENS — até 18 anos
- A1 TEENS, A2 TEENS, B1 TEENS, B1+ TEENS, B2 TEENS, C1 TEENS, C1+ TEENS
- Desenvolvimento completo; linguagem acadêmica e social; preparo para exames internacionais.

## ADULTS — 18+
- A1 ADULTS, A2 ADULTS, B1 ADULTS, B1+ ADULTS, B2 ADULTS, C1 ADULTS, C1+ ADULTS
- Foco profissional e acadêmico; aplicação prática; abordagem flexível.

## Programas especiais
- C2 Pro: para quem concluiu o C1; domínio avançado.
- VIP: teens e adultos, ensino por objetivo, percurso personalizado.

## Implicações para o ensino
1. Ajuste o método às características do segmento e ao estágio de desenvolvimento.
2. Use sempre o nome completo do nível e mantenha o alinhamento com o CEFR em mente.
3. Considere as opções especiais (C2 Pro e VIP) quando o objetivo do aluno pedir.
4. Prepare a transição de nível e mantenha a coordenação informada.`},

  {id:'fm-avaliacao', emoji:'🏅', ordem:140, titulo:'Sistema de avaliação — as quatro bandas',
   resumo:'DISTINCTION, MERIT, PASS e UNSATISFACTORY nas seis habilidades.',
   conteudo:`Os descritores de desempenho existem para dar um retrato claro do aluno à família e à escola. Avaliamos seis habilidades:
- Gramática: uso correto das estruturas e regras.
- Vocabulário: conhecimento e uso adequado de palavras e expressões.
- Compreensão de Texto (Reading).
- Compreensão Oral (Listening).
- Produção Escrita (Writing).
- Produção Oral (Speaking).

## As quatro bandas
- DISTINCTION: supera as expectativas do nível, com domínio excepcional.
- MERIT: atingiu com excelência os objetivos do nível.
- PASS: alcançou satisfatoriamente os objetivos essenciais do nível.
- UNSATISFACTORY: ainda não atingiu os objetivos mínimos esperados.

## Como ler os descritores
- Cada habilidade tem cinco aspectos avaliados.
- Os descritores são progressivos: cada nível superior inclui o que vem antes.
- As descrições focam em comportamentos observáveis, não em impressões.
- O objetivo é um retrato fiel e compreensível — que a família entenda onde o filho se destaca e onde pode melhorar.
- Avalie também a aplicação prática em situações reais de comunicação, não só o conhecimento técnico.`},

  {id:'fm-sponte', emoji:'💻', ordem:150, titulo:'Sponte — o que registrar e como',
   resumo:'A rotina diária de registro e o padrão dos resumos.',
   conteudo:`O Sponte é o canal com as famílias. Tudo é registrado em português, para comunicação clara com os pais. Cada professor tem login próprio.

## Rotina diária
1. Presença — marque presenças e faltas no início da aula; registre atrasos e saídas antecipadas.
2. Resumo da aula — em português, contendo apenas:
- as páginas trabalhadas (ex.: Student's Book páginas 24-25)
- a tarefa com explicação clara (ex.: TASK: Workbook página 15 - exercícios 3 e 4: praticar o uso de adjetivos comparativos)
3. Tema de casa — registre quem fez, quem não fez e quem fez parcialmente, antes da aula seguinte.

## Boas práticas
- Atualize todo dia; não deixe acumular.
- Reserve um horário fixo para isso.
- Mantenha o padrão: linguagem simples e voltada aos pais, só páginas e tarefa.`},
