<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Togethere · Gestão Escolar</title>
<!-- PWA: app instalável no celular/tablet -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#005EAF" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Togethere" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Urbanist:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Zilla+Slab:ital,wght@1,600;1,700&display=swap" rel="stylesheet" />
<style>
/* ===================== Togethere — Identidade NUSA ===================== */
:root{
  --azul:#005EAF;       /* principal */
  --marinho:#002B64;    /* profundo */
  --vermelho:#E52524;   /* alerta */
  --amarelo:#FFC800;    /* destaque */
  --rosa:#FF005F;       /* apoio */
  --laranja:#FF2A00;    /* apoio */
  --roxo:#DF6DFF;       /* apoio */

  --bg:#F4F6FB;
  --card:#FFFFFF;
  --tinta:#15233B;
  --tinta-suave:#5A6B86;
  --linha:#E4E9F2;
  --ok:#16A07A;

  --r:16px;
  --r-sm:11px;
  --sombra:0 8px 30px rgba(0,43,100,.08);
  --sombra-sm:0 2px 10px rgba(0,43,100,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Urbanist',system-ui,sans-serif;
  background:var(--bg);
  color:var(--tinta);
  font-weight:400;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;font-weight:600;line-height:1.2}
.display{font-family:'Zilla Slab',serif;font-style:italic;font-weight:600}
button{font-family:'Poppins',sans-serif;cursor:pointer}
input,textarea,select{font-family:'Urbanist',sans-serif}
a{color:inherit}

/* feijão — assinatura da marca */
.feijao{display:inline-block;border-radius:62% 38% 55% 45% / 55% 48% 52% 45%}

/* ===================== LOGIN ===================== */
#login{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(120% 120% at 100% 0%, #0a6dc4 0%, var(--azul) 38%, var(--marinho) 100%);
  overflow:hidden;z-index:50;
}
#login .blob{position:absolute;opacity:.9;filter:saturate(1.1)}
#login .b1{width:230px;height:230px;background:var(--amarelo);top:-60px;left:-50px;transform:rotate(18deg)}
#login .b2{width:170px;height:170px;background:var(--rosa);bottom:-40px;left:12%;transform:rotate(-12deg)}
#login .b3{width:140px;height:140px;background:var(--roxo);top:14%;right:8%;transform:rotate(30deg)}
#login .b4{width:90px;height:90px;background:var(--vermelho);bottom:18%;right:18%}
.login-card{
  position:relative;z-index:2;width:min(440px,92vw);background:var(--card);
  border-radius:26px;padding:38px 34px;box-shadow:0 30px 80px rgba(0,20,55,.4);
  animation:rise .5s ease both;
}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.brand{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.brand .mark{width:42px;height:42px;background:var(--azul);position:relative;flex:none}
.brand .mark::after{content:"";position:absolute;width:15px;height:15px;background:var(--amarelo);border-radius:60% 40% 55% 45%;right:-4px;bottom:-4px}
.brand .name{font-family:'Poppins';font-weight:700;font-size:1.45rem;letter-spacing:-.5px}
.brand .name b{color:var(--azul)}
/* logomarca oficial (arquivo logo.png na pasta do projeto) */
.logo-img{height:46px;width:auto;display:block}
.wm{font-family:'Poppins';font-weight:700;font-size:1.4rem;letter-spacing:-.5px;color:var(--marinho)}
.wm b{color:var(--azul)}
.tagline{font-family:'Zilla Slab';font-style:italic;font-weight:600;color:var(--tinta-suave);margin:2px 0 26px;font-size:1.02rem}
.login-card h2{font-size:1.06rem;margin-bottom:14px}
.perfis{display:grid;gap:12px}
.perfil-btn{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:#fff;border:1.5px solid var(--linha);border-radius:var(--r);padding:14px 16px;
  transition:.15s;font-size:.97rem;color:var(--tinta);
}
.perfil-btn:hover{border-color:var(--azul);transform:translateY(-2px);box-shadow:var(--sombra-sm)}
.perfil-btn .ic{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-size:1.25rem;flex:none}
.perfil-btn small{display:block;color:var(--tinta-suave);font-size:.8rem;font-family:'Urbanist'}
.perfil-btn b{font-family:'Poppins';font-weight:600}
.grp-login{font-family:'Poppins';font-weight:600;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--tinta-suave);margin:16px 2px 8px}
.grp-login:first-child{margin-top:4px}

/* ===================== APP SHELL ===================== */
#app{display:none;min-height:100vh}
.shell{display:flex;min-height:100vh}

/* Sidebar */
.side{
  width:248px;background:linear-gradient(180deg,var(--marinho),#001a3f);color:#fff;
  display:flex;flex-direction:column;flex:none;position:sticky;top:0;height:100vh;
}
.side .top{padding:22px 20px 14px}
.side .brand .name{color:#fff;font-size:1.2rem}
.side .brand .name b{color:var(--amarelo)}
.side .brand{background:#fff;border-radius:12px;padding:7px 11px;display:inline-flex;align-items:center}
.side .logo-img{height:28px}
.side .wm{font-size:1.12rem}
.side .brand .mark{width:34px;height:34px}
.nav{flex:1;overflow-y:auto;padding:8px 12px 20px}
.nav .grp{font-size:.68rem;text-transform:uppercase;letter-spacing:.12em;color:#7f94b8;margin:16px 10px 6px;font-family:'Poppins';font-weight:600}
.nav button{
  display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:11px;
  color:#c5d3ea;font-size:.92rem;font-family:'Poppins';font-weight:500;margin-bottom:2px;
  transition:.13s;border:none;background:none;width:100%;text-align:left;cursor:pointer;
}
.nav button .em{font-size:1.05rem;width:20px;text-align:center}
.nav button:hover{background:rgba(255,255,255,.07);color:#fff;transition:.2s}
.nav button.active{background:var(--azul);color:#fff;box-shadow:0 4px 12px rgba(0,94,175,.3)}
.nav button .badge{margin-left:auto;background:var(--vermelho);color:#fff;font-size:.7rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
.side .foot{padding:14px 18px;border-top:1px solid rgba(255,255,255,.1);font-size:.82rem;color:#9fb1d1}
.side .foot button{background:none;border:none;color:#9fb1d1;font-size:.82rem;display:flex;align-items:center;gap:8px;width:100%;padding:6px 0}
.side .foot button.btn-sair{font-size:1.02rem;font-weight:600;justify-content:center;gap:10px;color:#ffdada;background:rgba(255,86,86,.16);border:1px solid rgba(255,120,120,.35);border-radius:11px;padding:12px 14px;margin-top:6px}
.side .foot button.btn-sair:active{background:rgba(255,86,86,.28)}
.side .foot button:hover{color:#fff}

/* Main */
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{
  background:var(--card);border-bottom:1px solid var(--linha);padding:16px 28px;
  display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:10;
}
.topbar h1{font-size:1.18rem}
.topbar .crumb{font-size:.8rem;color:var(--tinta-suave);font-family:'Poppins'}
.topbar .me{margin-left:auto;display:flex;align-items:center;gap:10px;font-size:.86rem;color:var(--tinta-suave)}
.topbar .me .dot{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;color:#fff;font-weight:600;font-family:'Poppins';font-size:.85rem}
.content{padding:26px 28px 60px;max-width:1180px;width:100%}

/* Hamburger (mobile) */
.burger{display:none;background:none;border:none;font-size:1.95rem;line-height:1;color:var(--marinho);padding:6px 12px;margin:-4px 6px -4px -6px;cursor:pointer;border-radius:10px}
.burger:active{background:rgba(0,0,0,.06)}

/* ===================== COMPONENTES ===================== */
.section-title{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.section-title .fj{width:18px;height:18px;flex:none}
.section-title h2{font-size:1.32rem}
.sub{color:var(--tinta-suave);font-size:.92rem;margin-bottom:20px}

.card{background:var(--card);border:1px solid var(--linha);border-radius:var(--r);box-shadow:var(--sombra-sm);padding:20px;margin-bottom:18px;animation:fadeIn .3s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card h3{font-size:1.02rem;margin-bottom:4px}
.card .hint{font-size:.84rem;color:var(--tinta-suave);margin-bottom:14px}

.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

label.lbl{display:block;font-family:'Poppins';font-weight:500;font-size:.85rem;margin:0 0 6px;color:var(--tinta)}
.field{margin-bottom:14px}
input[type=text],input[type=password],input[type=email],input[type=time],input[type=date],input[type=number],textarea,select{
  width:100%;border:1.5px solid var(--linha);border-radius:var(--r-sm);padding:11px 13px;
  font-size:.94rem;background:#fff;color:var(--tinta);transition:.13s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--azul);box-shadow:0 0 0 3px rgba(0,94,175,.12)}
textarea{resize:vertical;min-height:90px;line-height:1.5}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:160px}

.btn{
  display:inline-flex;align-items:center;gap:8px;background:var(--azul);color:#fff;border:none;
  border-radius:var(--r-sm);padding:11px 18px;font-weight:600;font-size:.9rem;transition:.13s;cursor:pointer;
}
.btn:hover{background:#0a6dc4;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,94,175,.25)}
.btn:active{transform:translateY(0);box-shadow:0 2px 6px rgba(0,94,175,.15)}
.btn.ghost{background:#fff;color:var(--azul);border:1.5px solid var(--linha)}
.btn.ghost:hover{border-color:var(--azul);background:#f2f7fd}
.btn.amarelo{background:var(--amarelo);color:var(--marinho)}
.btn.amarelo:hover{background:#ffd633}
.btn.red{background:var(--vermelho)}
.btn.red:hover{background:#c91f1e}
.btn.sm{padding:7px 12px;font-size:.82rem}
.btn.block{width:100%;justify-content:center}

.tag{display:inline-flex;align-items:center;gap:5px;font-family:'Poppins';font-weight:600;font-size:.72rem;padding:3px 10px;border-radius:20px}
.tag.kids{background:#fff0f6;color:var(--rosa)}
.tag.junior{background:#fff8e0;color:#b88600}
.tag.teens{background:#eaf3ff;color:var(--azul)}
.tag.adults{background:#f4ecff;color:#9333c7}
.tag.talking{background:#ffeee9;color:var(--laranja)}
.pill{font-size:.74rem;font-family:'Poppins';font-weight:600;padding:3px 9px;border-radius:20px;background:#eef2f8;color:var(--tinta-suave)}

table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;font-family:'Poppins';font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:var(--tinta-suave);padding:8px 10px;border-bottom:1px solid var(--linha)}
td{padding:10px;border-bottom:1px solid var(--linha);vertical-align:middle}
tr:last-child td{border-bottom:none}

.seg{display:inline-flex;background:#eef2f8;border-radius:10px;padding:3px}
.seg button{background:none;border:none;padding:6px 13px;border-radius:8px;font-size:.82rem;font-weight:600;color:var(--tinta-suave)}
.seg button.on-p{background:var(--ok);color:#fff}
.seg button.on-f{background:var(--vermelho);color:#fff}
.seg button.on-ok{background:var(--ok);color:#fff}
.seg button.on-mid{background:var(--amarelo);color:#4a3a00}
.seg button.on-no{background:var(--vermelho);color:#fff}
.dash-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:10px 0 4px}
.dash-grid .stat{background:#f3f8ff;border:1px solid #e6eefb;border-radius:12px;padding:12px;text-align:center}
.dash-grid .stat .n{font-size:1.5rem;font-weight:800;color:var(--azul);line-height:1}
.dash-grid .stat .l{font-size:.74rem;color:var(--tinta-suave);margin-top:3px}

.check{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--linha)}
.check:last-child{border-bottom:none}
.check input{width:20px;height:20px;accent-color:var(--azul);flex:none;cursor:pointer}
.check span{flex:1}
.check.done span{text-decoration:line-through;color:var(--tinta-suave)}
.check .x{background:none;border:none;color:var(--tinta-suave);font-size:1rem;opacity:.5}
.check .x:hover{opacity:1;color:var(--vermelho)}

.empty{text-align:center;padding:34px 20px;color:var(--tinta-suave)}
.empty .big{font-size:2rem;margin-bottom:8px;opacity:.5}

.alert-card{display:flex;gap:14px;align-items:flex-start;border-left:4px solid var(--vermelho);background:#fff;border-radius:var(--r-sm);padding:15px 16px;margin-bottom:12px;box-shadow:var(--sombra-sm)}
.alert-card.mat{border-left-color:var(--laranja)}
.alert-card .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;flex:none;font-size:1.1rem}
.alert-card .ic.falta{background:#fdeaea;color:var(--vermelho)}
.alert-card .ic.mat{background:#ffeee5;color:var(--laranja)}
.alert-card .info{flex:1}
.alert-card .info b{font-family:'Poppins'}
.alert-card .info p{font-size:.86rem;color:var(--tinta-suave);margin-top:2px}
.alert-card .acts{display:flex;flex-direction:column;gap:6px}

/* Eisenhower */
.emat{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.quad{border-radius:var(--r);padding:16px;min-height:180px;border:1.5px solid var(--linha);background:#fff}
.quad h4{display:flex;align-items:center;gap:8px;font-size:.95rem;margin-bottom:3px}
.quad .qsub{font-size:.76rem;color:var(--tinta-suave);margin-bottom:12px}
.quad .dot{width:11px;height:11px;border-radius:50%}
.quad.q1{border-top:4px solid var(--vermelho)}
.quad.q2{border-top:4px solid var(--azul)}
.quad.q3{border-top:4px solid var(--amarelo)}
.quad.q4{border-top:4px solid var(--tinta-suave)}
.task{background:#f7f9fc;border:1px solid var(--linha);border-radius:10px;padding:9px 11px;margin-bottom:8px;font-size:.88rem;display:flex;gap:8px;align-items:flex-start}
.task .grab{cursor:grab;color:var(--tinta-suave);font-size:.8rem;padding-top:2px}
.task .t-txt{flex:1}
.task .mv{font-size:.72rem;color:var(--azul);background:none;border:none;font-family:'Poppins';font-weight:600}
.task .del{background:none;border:none;color:var(--tinta-suave);opacity:.5;font-size:.85rem}
.task .del:hover{opacity:1;color:var(--vermelho)}
.task.feito{opacity:.55}.task.feito .t-txt{text-decoration:line-through}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--marinho);color:#fff;padding:13px 22px;border-radius:12px;font-family:'Poppins';font-weight:500;font-size:.9rem;box-shadow:0 12px 40px rgba(0,20,55,.35);opacity:0;transition:.25s;z-index:99;display:flex;align-items:center;gap:9px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.modal-bg{position:fixed;inset:0;background:rgba(0,20,55,.45);display:none;align-items:center;justify-content:center;z-index:60;padding:18px}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:var(--r);width:min(520px,96vw);max-height:90vh;overflow:auto;padding:24px;box-shadow:var(--sombra)}
.modal h3{margin-bottom:14px;display:flex;align-items:center;gap:9px}
.modal .close{margin-left:auto;background:none;border:none;font-size:1.3rem;color:var(--tinta-suave);cursor:pointer}

.gen-box{background:#f7f9fc;border:1.5px dashed var(--linha);border-radius:var(--r-sm);padding:16px;font-size:.92rem;line-height:1.65;white-space:pre-wrap;color:var(--tinta);min-height:80px}

.kpi{display:flex;align-items:center;gap:14px}
.kpi .num{font-family:'Poppins';font-weight:700;font-size:1.9rem;line-height:1}
.kpi .k-ic{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:1.3rem;flex:none}
.kpi small{color:var(--tinta-suave);font-size:.82rem;display:block;margin-top:3px}

@media(max-width:860px){
  .side{position:fixed;left:-260px;z-index:40;transition:.25s;box-shadow:0 0 60px rgba(0,0,0,.4)}
  .side.open{left:0}
  .burger{display:block}
  .g2,.g3{grid-template-columns:1fr}
  .emat{grid-template-columns:1fr}
  .content{padding:18px 16px 50px}
  .topbar{padding:14px 16px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.seg{display:inline-flex;gap:4px}
.calwrap{overflow-x:auto;border:1px solid #e6e8ee;border-radius:12px}
.calhead,.calrow{display:flex;min-width:720px;border-bottom:1px solid #eef0f3}
.calhcell{flex:1;min-width:96px;text-align:center;padding:6px 2px;font-size:.78rem}
.calhead .calhcell:first-child,.calrow .calhcell:first-child{flex:none;width:48px;min-width:48px}
.calhcell.hoje{background:#eaf3ff;font-weight:700}
.calgrid{display:flex;min-width:720px}
.calhours{flex:none;width:48px;min-width:48px;display:flex;flex-direction:column}
.calhour{font-size:.66rem;color:var(--tinta-suave);text-align:right;padding-right:4px;border-bottom:1px solid #f3f4f7;box-sizing:border-box}
.calday{flex:1;min-width:96px;position:relative;border-left:1px solid #eef0f3;box-sizing:border-box}
.calday.allday{min-height:24px;padding:2px}
.calblk{position:absolute;left:2px;right:2px;border-radius:6px;color:#fff;font-size:.66rem;line-height:1.06;padding:2px 4px;overflow:hidden;cursor:pointer;box-shadow:0 1px 2px rgba(0,0,0,.18)}
.calblk.turma{background:#dfe7f5 !important;color:#1a3a6b;border:1px dashed #9bb4dd;box-shadow:none}
.evchip{display:inline-block;color:#fff;border-radius:6px;font-size:.66rem;padding:1px 6px;margin:1px;cursor:pointer}
.task.agenda{background:#fff7e6;border-left:3px solid var(--laranja)}
.agenda-wrap{margin-bottom:6px}
.quad.dragover{outline:2px dashed var(--azul);outline-offset:-4px}
</style>
</head>
<body>

<!-- ===================== LOGIN ===================== -->
<div id="login">
  <span class="feijao blob b1"></span>
  <span class="feijao blob b2"></span>
  <span class="feijao blob b3"></span>
  <span class="feijao blob b4"></span>
  <div class="login-card">
    <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
    <div class="tagline">inglês para chegar lá</div>
    <h2 id="loginTitulo">Entrar</h2>
    <div id="loginPanel"></div>
  </div>
</div>

<!-- ===================== APP ===================== -->
<div id="app">
  <div class="shell">
    <aside class="side" id="side">
      <div class="top">
        <div class="brand"><img src="logo.png" alt="togethere" class="logo-img" onerror="logoFallback(this)"></div>
      </div>
      <nav class="nav" id="nav"></nav>
      <div class="foot">
        <div id="syncDot" onclick="puxarDaNuvem()" style="font-size:.72rem;color:#9fb1d1;margin-bottom:8px;cursor:pointer" title="Clique para puxar os dados mais recentes da nuvem">☁️ …</div>
        <button onclick="puxarDaNuvem()" style="margin-bottom:8px">🔄 Atualizar (puxar da nuvem)</button>
        <div id="perfilLabel" style="margin-bottom:8px"></div>
        <div style="font-size:.66rem;color:#9fb1d1;margin-bottom:6px">versão <span id="appVer"></span></div>
        <button onclick="trocarMinhaSenha()" style="margin-bottom:8px">🔑 Trocar minha senha</button>
        <button class="btn-sair" onclick="logout()">🚪 Sair</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <button class="burger" onclick="document.getElementById('side').classList.toggle('open')">☰</button>
        <div>
          <div class="crumb" id="crumb">Início</div>
          <h1 id="pageTitle">Painel</h1>
        </div>
        <div class="me">
          <span id="meName"></span>
          <span class="dot" id="meDot"></span>
        </div>
      </header>
      <div class="content" id="view"></div>
    </div>

const KEY='togethere_v2';

function load(){
  let s=null;
  try{const r=localStorage.getItem(KEY);if(r)s=JSON.parse(r);}catch(e){}
  if(!s) s=seed();
  return migrar(s);
}
function migrar(s){
  s.versao=s.versao||1;
  if(s.versao<2){                 // (legado) não mexe mais em senhas
    s.versao=2;
  }
  if(s.versao<3){                 // Segurança: senhas saem do app; agora ficam só no servidor (com hash)
    (s.usuarios||[]).forEach(u=>{ delete u.senha; });
    s.versao=3;
  }
  if(s.versao<4){ s.versao=4; }   // marca para os campos novos (nascimento/arquivado/saldo)
  if(s.versao<5){                 // novo usuário: Maitê (professora)
    s.usuarios=s.usuarios||[];
    if(!s.usuarios.some(u=>u.nome==='Maitê')) s.usuarios.push({nome:'Maitê', perfil:'professor', ensina:'Maitê'});

  s.vipAlunos=s.vipAlunos||[];

      if(!vp){ vp={id:uid(),nome}; s.vipAlunos.push(vp); }
      a.vipId=vp.id; delete a.alunoId;
    }
    if(typeof a.faltou==='undefined') a.faltou=false;
    if(typeof a.tema==='undefined') a.tema='';

  (s.alunos||[]).forEach(a=>{ if('vip' in a) delete a.vip; });
  (s.temas||[]).forEach(t=>{ if(!t.dataEntrega) t.dataEntrega=t.data; });

let _syncTimer=null;
function cloudOn(){ return CLOUD_URL && CLOUD_URL.indexOf('/exec')>0; }
function marcarSync(st){
  const e=document.getElementById('syncDot');
  if(e) e.textContent = st==='ok' ? '☁️ sincronizado' : st==='off' ? (_pendenteSync?'⏳ alterações aguardando conexão':'⚠️ sem conexão') : '☁️ sincronizando…';
}
async function cloudGet(timeout){
  if(!cloudOn()) return {ok:false, off:true};
  if(!CLOUD_TOKEN) return {ok:false, auth:true};                   // ainda não logou → sem token
  const ctrl=new AbortController(); const t=setTimeout(()=>ctrl.abort(),timeout||8000);
  try{
    const r=await fetch(CLOUD_URL+'?action=get&token='+encodeURIComponent(CLOUD_TOKEN),{signal:ctrl.signal});
    clearTimeout(t);
    const j=await r.json();
    if(j && j.ok===false && j.erro==='auth') return {ok:false, auth:true};   // token inválido/expirado
    return {ok:true, state:(j && Object.keys(j).length)?j:null};   // ok=respondeu; state=null só quando REALMENTE vazio
  }catch(e){ clearTimeout(t); return {ok:false}; }                 // ok=false → erro/sem conexão (NÃO é nuvem vazia)
}
function temAtividade(s){
  if(!s) return false;
  return ['presencas','material','temas','testes','contatos','planos','comentarios','atas','tarefas','relatorios','vipAlunos','aulasVip','boletins']
    .some(k=>Array.isArray(s[k]) && s[k].length);
}
const MERGE_COLS=['usuarios','turmas','alunos','presencas','material','temas','testes','contatos','planos','comentarios','atas','tarefas','relatorios','vipAlunos','aulasVip','boletins','eventos','comunicados','planejamento','recessos','alertas','apoios','writings','formacao','formacaoReg','formacaoSessoes'];
function marcarExcluido(col,id){
  if(id==null) return;
  S.exclusoes=S.exclusoes||[];
  S.exclusoes.push({col,id,ts:Date.now()});
  if(S.exclusoes.length>3000) S.exclusoes=S.exclusoes.slice(-3000);
}
function _keyItem(col,it){
  if(col==='usuarios') return 'u:'+((it&&it.nome)||'');
  if(it && it.id!=null) return 'i:'+it.id;
  return 'j:'+JSON.stringify(it);
}
// Junta o estado da nuvem com o local SEM perder dados de outros aparelhos:
// união por id. Em registros com carimbo 'atualizadoEm', vence quem editou por último
// (evita um aparelho com cópia antiga reverter, ex.: relatório voltar de "enviado" para pendente).
// Sem carimbo, mantém o comportamento antigo (local vence). Respeita as marcas de exclusão.
function mergeEstados(cloud, local){
  const out=Object.assign({}, cloud, local);   // campos simples: local vence
  const tomb={};
  [].concat(cloud.exclusoes||[], local.exclusoes||[]).forEach(t=>{ (tomb[t.col]=tomb[t.col]||new Set()).add(t.id); });
  MERGE_COLS.forEach(col=>{
    const map=new Map();
    (Array.isArray(cloud[col])?cloud[col]:[]).forEach(it=>map.set(_keyItem(col,it),it));
    (Array.isArray(local[col])?local[col]:[]).forEach(it=>{
      const k=_keyItem(col,it), ex=map.get(k);
      if(!ex){ map.set(k,it); return; }
      if(col==='relatorios'){
        const base=Object.assign({}, (it.atualizadoEm||0)>=(ex.atualizadoEm||0) ? it : ex);   // corpo: o mais recente vence
        const eI=it.enviadoTs||0, eE=ex.enviadoTs||0;
        if(eI||eE){                                          // "enviado" tem carimbo próprio → independe da edição do corpo
          const w=eI>=eE ? it : ex;
          base.enviado=!!w.enviado; base.enviadoEm=w.enviadoEm; base.enviadoQtd=w.enviadoQtd; base.enviadoTs=Math.max(eI,eE);
        } else if(ex.enviado||it.enviado){                   // relatórios antigos (sem carimbo): "enviado" não volta atrás
          base.enviado=true; base.enviadoEm=ex.enviadoEm||it.enviadoEm; base.enviadoQtd=ex.enviadoQtd||it.enviadoQtd;
        }
        map.set(k, base); return;
      }
      if(col==='alunos'){
        const win=Object.assign({}, (it.atualizadoEm||0)>=(ex.atualizadoEm||0) ? it : ex);   // recência vence (igual ao critério geral)
        // histórico de relatórios enviados é append-only → une os dois lados para nunca perder um registro.
        // Mantém a mesma regra do app: 1 registro por aluno por dia (vence o de envio mais recente).
        const hist=[].concat(Array.isArray(ex.relatoriosEnviados)?ex.relatoriosEnviados:[], Array.isArray(it.relatoriosEnviados)?it.relatoriosEnviados:[]);
        if(hist.length){
          const byDay=new Map();
          hist.forEach(r=>{ const day=r&&(r.em||('t'+r.ts)); if(day==null)return; const cur=byDay.get(day); if(!cur || (r.ts||0)>=(cur.ts||0)) byDay.set(day,r); });
          win.relatoriosEnviados=[...byDay.values()].sort((x,y)=>(x.ts||0)-(y.ts||0));
        }
        map.set(k, win); return;
      }
      if(col==='presencas' || col==='planos'){
        const sI=it.atualizadoEm||0, sE=ex.atualizadoEm||0;
        if(sI||sE){ map.set(k, sI>=sE ? it : ex); }            // alguém carimbou → recência vence
        else {                                                  // legado sem carimbo: "feito" não regride
          const done = (col==='presencas') ? (it.fechada?it:(ex.fechada?ex:it))
                                            : (it.realizado?it:(ex.realizado?ex:it));
          map.set(k, done);
        }
        return;
      }
      if(ex.atualizadoEm!=null || it.atualizadoEm!=null){
        map.set(k, (it.atualizadoEm||0) >= (ex.atualizadoEm||0) ? it : ex);   // recência vence
      } else { map.set(k, it); }                                              // sem carimbo: local vence
    });
    let arr=[...map.values()];
    if(tomb[col]) arr=arr.filter(it=>!(it && it.id!=null && tomb[col].has(it.id)));
    out[col]=arr;
  });
  const seen=new Set(), mt=[];
  [].concat(cloud.exclusoes||[], local.exclusoes||[]).forEach(t=>{ const k=t.col+'|'+t.id; if(!seen.has(k)){ seen.add(k); mt.push(t); } });
  out.exclusoes=mt.slice(-3000);
  return out;
}
async function cloudPut(force){
  if(!cloudOn()) return;
  if(!CLOUD_TOKEN) return;                      // só sincroniza quem está logado
  marcarSync('...');
  if(!force){
    try{
      const cur=await cloudGet(7000);
      if(cur.ok && cur.state && Array.isArray(cur.state.usuarios) && cur.state.usuarios.length){
        const u=S.usuario, p=S.perfil;
        S=mergeEstados(cur.state, S); S.usuario=u; S.perfil=p;
        localStorage.setItem(KEY,JSON.stringify(S));
      } else if(cur.auth){ marcarSync('off'); toast('Sessão expirada. Saia e entre novamente.'); return {ok:false,erro:'auth'}; }
      else if(cur.ok && !cur.state){ /* nuvem REALMENTE vazia (primeira carga) → pode enviar o local */ }
      else {
        // Erro de rede ao LER a nuvem antes de gravar. NÃO enviar o estado local agora:
        // ele pode estar desatualizado e sobrescreveria (apagaria) o que outro aparelho
        // acabou de salvar — ex.: um relatório do professor que a secretaria ainda não viu.
        // Fica pendente e reenvia sozinho quando a conexão voltar (online/visibility/heartbeat).
        marcarSync('off'); return {ok:false, adiado:true};
      }
    }catch(e){ marcarSync('off'); return {ok:false, adiado:true}; }
  }
  const limpo=Object.assign({},S,{usuario:null,perfil:null});   // sessão não vai para a nuvem
  const url=CLOUD_URL+'?action=put&token='+encodeURIComponent(CLOUD_TOKEN)+(force?'&force=1':'');
  return fetch(url,{
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(limpo)
  }).then(r=>r.json().catch(()=>({ok:true})))
    .then(j=>{
      if(j && j.ok===false && j.erro==='auth'){ marcarSync('off'); toast('Sessão expirada. Saia e entre novamente.'); return j; }
      marcarSync(j&&j.bloqueado?'off':'ok');
      if(j && j.ok!==false && !j.bloqueado) _marcarPendente(false);   // nuvem confirmou → nada pendente
      return j;
    })
    .catch(()=>{ marcarSync('off'); });
}
let _pendenteSync=false, _sincronizando=false, _filaSyncOn=false;
const PEND_KEY=KEY+'_pend';
function _marcarPendente(v){
  _pendenteSync=v;
  try{ if(v) localStorage.setItem(PEND_KEY,'1'); else localStorage.removeItem(PEND_KEY); }catch(e){}
}
// Tenta enviar o que está pendente. Reusa cloudPut (puxa→mescla→envia). Não roda em paralelo.
async function flushSync(){
  if(!cloudOn()||!CLOUD_TOKEN) return;
  if(!_pendenteSync || _sincronizando) return;
  _sincronizando=true;
  try{ await cloudPut(); }catch(e){}
  finally{ _sincronizando=false; }
}
// Registra os gatilhos que reenviam sozinhos quando dá: volta da conexão, app reabre, e a cada 25s.
function _iniciarFilaSync(){
  if(_filaSyncOn) return; _filaSyncOn=true;
  try{ if(localStorage.getItem(PEND_KEY)) _pendenteSync=true; }catch(e){}
  window.addEventListener('online', function(){ flushSync(); });
  document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='visible'){ flushSync(); _refreshAvisosNuvem(); } });
  const _hb=setInterval(function(){ if(!('onLine' in navigator) || navigator.onLine!==false) flushSync(); }, 25000);
  if(_hb && _hb.unref) _hb.unref();
  const _av=setInterval(_refreshAvisosNuvem, 20000);   // Avisos se atualizam sozinhos a cada 20s
  if(_av && _av.unref) _av.unref();
}
function save(){
  localStorage.setItem(KEY,JSON.stringify(S));
  _marcarPendente(true);                  // marca que há algo a enviar (some quando a nuvem confirmar)
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(flushSync,800);   // agrupa edições rápidas antes de enviar
}
async function puxarDaNuvem(){
  marcarSync('...');
  const res=await cloudGet(8000);
  if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
    const u=S.usuario, p=S.perfil;
    S=migrar(res.state); S.usuario=u; S.perfil=p;
    localStorage.setItem(KEY,JSON.stringify(S));
    marcarSync('ok'); toast('Dados atualizados da nuvem ✓');
    try{ if(typeof rota!=='undefined' && rota && VIEWS[rota]) VIEWS[rota](); montarNav(); }catch(e){}
  } else if(res.ok && !res.state){
    marcarSync('ok'); toast('A nuvem ainda está vazia');
  } else {
    marcarSync('off'); toast('Sem conexão com a nuvem agora');
  }
}
// ---- Auto-refresh dos Avisos: puxa em silêncio e só redesenha se algo mudou ----
// Assinatura do que a tela de Avisos mostra (relatórios pendentes + faltas/material/contatos).
function _sigAvisos(){
  try{ return JSON.stringify({
    r:(S.relatorios||[]).filter(x=>!x.enviado).map(x=>x.id).sort(),
    p:S.presencas||[], m:S.material||[], c:S.contatos||[]
  }); }catch(e){ return ''; }
}
let _avisosBusy=false;
async function _refreshAvisosNuvem(){
  if(rota!=='alertas') return;                                            // só quando está nos Avisos
  if(document.visibilityState && document.visibilityState!=='visible') return;
  if(!cloudOn()||!CLOUD_TOKEN) return;
  if(('onLine' in navigator) && navigator.onLine===false) return;
  if(_avisosBusy || _sincronizando || _pendenteSync) return;              // não concorre com o envio (push)
  _avisosBusy=true;
  try{
    const res=await cloudGet(7000);
    if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
      const antes=_sigAvisos();
      const u=S.usuario, p=S.perfil;
      S=mergeEstados(migrar(res.state), S); S.usuario=u; S.perfil=p;      // mescla (não perde edição local)
      localStorage.setItem(KEY,JSON.stringify(S));
      if(_sigAvisos()!==antes && rota==='alertas' && !modalTemConteudo()){ VIEWS.alertas(); montarNav(); }  // redesenha só se mudou e sem modal aberto
    }
  }catch(e){}
  finally{ _avisosBusy=false; }
}
// Puxa a nuvem em silêncio ao abrir telas de consulta (relatórios/painel/ficha/VIP),
// para que a secretaria/direção vejam o que os professores acabaram de enviar sem
// precisar tocar em "Atualizar". Mescla (não perde edição local) e, se pedido,
// redesenha a tela atual — só quando não há modal aberto (não atrapalha digitação).
async function _pullSilencioso(reRender){
  if(!cloudOn()||!CLOUD_TOKEN) return;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function diasAtras(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function pesoFalta(turmaId){const t=S.turmas.find(x=>x.id===turmaId);const n=(t&&t.dias&&t.dias.length)?t.dias.length:(t&&t.vezesSemana);return n===1?2:1;}
function temAula2(turmaId){const t=S.turmas.find(x=>x.id===turmaId);const n=(t&&t.dias&&t.dias.length)?t.dias.length:(t&&t.vezesSemana);return n===1;}
const DIAS_SEMANA=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
function ymd(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function weekdayOf(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d).getDay();}
function diasFromHorario(hor){const map={seg:1,ter:2,qua:3,qui:4,sex:5,sab:6,dom:0};const f=[];(hor||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(/[^a-z]+/).forEach(tok=>{const k=tok.slice(0,3);if(map[k]!=null&&!f.includes(map[k]))f.push(map[k]);});return f.sort((a,b)=>a-b);}
function diasTurmaLabel(t){return (t&&t.dias&&t.dias.length)?t.dias.map(d=>DIAS_SEMANA[d]).join('/'):'';}
function datasAula(turmaId,atras,frente){atras=atras==null?8:atras;frente=frente==null?2:frente;const t=S.turmas.find(x=>x.id===turmaId);if(!t||!t.dias||!t.dias.length)return[];const out=[];const a=new Date();a.setDate(a.getDate()-atras*7);const b=new Date();b.setDate(b.getDate()+frente*7);for(let d=new Date(a);d<=b;d.setDate(d.getDate()+1)){if(t.dias.includes(d.getDay()))out.push(ymd(new Date(d)));}return out;}
function dataAulaPadrao(turmaId,datas){datas=datas||datasAula(turmaId);if(!datas.length)return hoje();const h=hoje();const pas=datas.filter(d=>d<=h).sort((x,y)=>y.localeCompare(x));if(pas.length)return pas[0];return datas.slice().sort()[0];}
function selectDataAula(id,turmaId,sel){let ds=datasAula(turmaId);if(!ds.length)return`<select id="${id}"><option value="">(defina os dias de aula da turma)</option></select>`;if(sel&&!ds.includes(sel))ds.push(sel);ds=[...new Set(ds)].sort((x,y)=>y.localeCompare(x));const def=sel||dataAulaPadrao(turmaId,ds);return`<select id="${id}">${ds.map(d=>`<option value="${d}" ${d===def?'selected':''}>${brDate(d)} · ${DIAS_SEMANA[weekdayOf(d)]}</option>`).join('')}</select>`;}
function proximaEntrega(turmaId,fromYmd){const ds=datasAula(turmaId,2,8).sort();const f=ds.filter(d=>d>(fromYmd||hoje()));return f[0]||ds[ds.length-1]||fromYmd||hoje();}

function _turmasParaAlertas(){
  let ts=S.turmas.filter(t=>!t.arquivada);
  if(S.perfil==='professor'){ const u=S.usuarios.find(u=>u.nome===S.usuario); ts=ts.filter(t=>t.professor===(u&&u.ensina)); }

// --- pausa de alertas durante recesso/férias ---
// Férias embutidas no plano (NÃO ficam em Recessos, senão bagunçam o ritmo previsto).
// Nestas janelas os alertas de falta/material pausam. Atualize as datas a cada ano.
const FERIAS_FIXAS=[
  {de:'2026-07-20', ate:'2026-08-02', nome:'Férias de meio de ano'}   // aulas voltam 03/08
];
function _emRecessoISO(iso){
  const d=_parseISO(iso); if(!d) return false;
  return (S.recessos||[]).some(r=>{ const de=_parseISO(r.de), ate=_parseISO(r.ate); return de&&ate&&d>=de&&d<=ate; });
}
function _emFeriasFixas(iso){
  const d=_parseISO(iso); if(!d) return false;
  return FERIAS_FIXAS.some(f=>{ const de=_parseISO(f.de), ate=_parseISO(f.ate); return de&&ate&&d>=de&&d<=ate; });
}
function escolaEmRecesso(){
  const h=hoje();
  return _emRecessoISO(h) || _emFeriasFixas(h);           // recessos cadastrados (verão/feriados longos) OU férias embutidas no plano
}
function alertasFaltas(){
  if(escolaEmRecesso()) return [];
  const out=[]; const vis=_turmasParaAlertas();
  S.alunos.forEach(a=>{
    if(!vis.has(a.turmaId)) return;
    const dois=temAula2(a.turmaId);
    const sess=S.presencas.filter(p=>p.turmaId===a.turmaId && _aulaConta(p) && p.registros && a.id in p.registros)
                          .sort((x,y)=>x.data.localeCompare(y.data));
    const seq=[];
    sess.forEach(p=>{
      const s1=p.registros[a.id];
      if(p.registros2){ seq.push(s1); seq.push(p.registros2[a.id]||'presente'); }
      else if(dois){ seq.push(s1); seq.push(s1); }   // legado conta por 2 aulas
      else { seq.push(s1); }
    });
    let streak=0;
    for(let i=seq.length-1;i>=0;i--){ if(seq[i]==='falta')streak++; else break; }
    if(streak>=3) out.push({alunoId:a.id, tipo:'falta', n:streak, motivo:`${streak} faltas consecutivas`});
  });
  return out.filter(o=>!jaContatado(o.alunoId,'falta'));
}
function alertasMaterial(){
  if(escolaEmRecesso()) return [];
  const out=[]; const vis=_turmasParaAlertas();
  S.alunos.forEach(a=>{
    if(!vis.has(a.turmaId)) return;
    const sess=S.material.filter(m=>m.turmaId===a.turmaId).sort((x,y)=>x.data.localeCompare(y.data));
    let streak=0, total=0;
    sess.forEach(m=>{ if(m.faltantes.includes(a.id)) total++; });
    for(let i=sess.length-1;i>=0;i--){ if(sess[i].faltantes.includes(a.id))streak++; else break; }
    if(streak>=3) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${streak} aulas seguidas`});
    else if(total>=5) out.push({alunoId:a.id,tipo:'material',motivo:`Sem material em ${total} aulas (alternadas)`});
  });
  return out.filter(o=>!jaContatado(o.alunoId,'material'));
}
function jaContatado(alunoId,tipo){
  return S.contatos.some(c=>c.alunoId===alunoId && c.tipo===tipo);
}
function criarAlerta(alunoId,tipo,motivo){

}

function faltasDoAluno(alunoId,turmaId){
  const dois=temAula2(turmaId), out=[];
  S.presencas.filter(p=>p.turmaId===turmaId && _aulaConta(p)).forEach(p=>{
    const f1 = p.registros && p.registros[alunoId]==='falta';
    if(p.registros2){ if(f1)out.push(p.data); if(p.registros2[alunoId]==='falta')out.push(p.data); }
    else if(dois){ if(f1){out.push(p.data);out.push(p.data);} }   // legado 1x/semana: vale por 2 aulas
    else { if(f1)out.push(p.data); }
  });
  return out.sort();
}
function materialDoAluno(alunoId,turmaId){
  return S.material.filter(m=>m.turmaId===turmaId && (m.faltantes||[]).includes(alunoId))
    .map(m=>m.data).sort();}
function atrasosDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.atrasados||[]).includes(alunoId)).map(p=>p.data).sort();}
function saidasCedoDoAluno(alunoId,turmaId){
  return S.presencas.filter(p=>p.turmaId===turmaId && (p.saiuCedo||[]).includes(alunoId)).map(p=>p.data).sort();}
function temasNaoFeitosDoAluno(alunoId,turmaId){
  return S.temas.filter(t=>t.turmaId===turmaId && t.entregas && (t.entregas[alunoId]===false || t.entregas[alunoId]==='parcial'))
    .map(t=>({data:t.data,descricao:t.descricao,origem:t.origem||'extra',status:t.entregas[alunoId]==='parcial'?'parcial':'naofeito'})).sort((a,b)=>a.data.localeCompare(b.data));
}
function comentariosDoAluno(alunoId){
  return S.comentarios.filter(c=>c.alunoId===alunoId).sort((a,b)=>a.data.localeCompare(b.data));
}
// lista geral de incidentes de um tipo (para a direção)
function registroGeral(tipo){
  const out=[];
  S.alunos.forEach(a=>{
    let datas=[];
    if(tipo==='falta') datas=faltasDoAluno(a.id,a.turmaId);
    else if(tipo==='material') datas=materialDoAluno(a.id,a.turmaId);
    else if(tipo==='tema') datas=temasNaoFeitosDoAluno(a.id,a.turmaId).map(t=>t.data);
    datas.forEach(d=>out.push({alunoId:a.id,turmaId:a.turmaId,data:d}));
  });
  return out.sort((x,y)=>y.data.localeCompare(x.data)); // mais recentes primeiro
}

  if(btn){ btn.disabled=false; btn.textContent='Entrar'; }
  if(!resp || resp.ok!==true){
    if(resp && (resp.erro==='usuario'||resp.erro==='senha')) toast('Usuário ou senha incorretos');
    else if(resp && resp.erro==='nuvem') toast('Nuvem não configurada');
    else toast('Sem conexão com o servidor. Tente de novo.');
    return;
  }
  // login aceito → guarda a sessão (token) neste aparelho
  CLOUD_TOKEN=resp.token;
  S.usuario=resp.usuario; S.perfil=resp.perfil;
  try{ localStorage.setItem(TKEY,resp.token); localStorage.setItem(UKEY,resp.usuario); localStorage.setItem(PKEY,resp.perfil); }catch(e){}
  // puxa o estado da nuvem já com o token recém-obtido
  const res=await cloudGet(8000);
  if(res.ok && res.state && res.state.usuarios && res.state.usuarios.length){
    S=migrar(res.state); S.usuario=resp.usuario; S.perfil=resp.perfil;
    try{ localStorage.setItem(KEY,JSON.stringify(S)); }catch(e){}
    marcarSync('ok');
  } else if(res.ok && !res.state){
    marcarSync('ok');   // nuvem vazia: mantém a base local; save/boot cuidam de enviar
  } else {
    marcarSync('off');  // offline: entra com o estado local que já está carregado
  }
  const u=(S.usuarios||[]).find(x=>x.nome===resp.usuario) || {nome:resp.usuario, perfil:resp.perfil, ensina:null};
  aplicarLogin(u);
}

// ===================== PENDÊNCIAS (chamada / plano / relatório) =====================
const PEND_JANELA_DIAS = 14;                 // só olha aulas dos últimos N dias
let   PEND_INICIO      = '2026-06-22';       // pendências só valem a partir desta data (aulas anteriores não contam)
const PEND_PRAZO_PROF  = 2*3600*1000;        // +2h após o fim da aula → avisa o professor
const PEND_PRAZO_DIR   = 26*3600*1000;       // +24h sobre isso → escala para a direção
const PEND_PRAZO_SECR  = 24*3600*1000;       // relatório gerado e não enviado por 24h → escala p/ direção
const PEND_ROTULO = { chamada:'Chamada não feita', plano:'Plano de aula não preenchido', relatorio:'Relatório da aula não gerado', enviar:'Relatório aguardando envio aos pais' };
function _horaFimTurma(t){
  const m=String((t&&t.horario)||'').match(/(\d{1,2}):(\d{2})/g);
  if(m&&m.length){ const p=m[m.length-1].split(':'); return {h:+p[0], mi:+p[1]}; }
  return {h:23, mi:59};
}
function _fimAulaTs(turmaId,data){
  const t=S.turmas.find(x=>x.id===turmaId)||{}; const f=_horaFimTurma(t);
  const a=String(data).split('-').map(Number);
  return new Date(a[0], a[1]-1, a[2], f.h, f.mi, 0).getTime();
}
function _ymdToTs(d){ const a=String(d||'').split('-').map(Number); if(a.length<3||!a[0]) return Date.now(); return new Date(a[0],a[1]-1,a[2],12,0,0).getTime(); }
function _nivelPend(fimTs){
  const dt=Date.now()-fimTs;
  if(dt < PEND_PRAZO_PROF) return null;      // ainda no prazo (professor tem tempo)
  if(dt < PEND_PRAZO_DIR)  return 'prof';    // avisa o professor
  return 'dir';                              // escala para a direção
}
// pendências de AULA de uma turma (chamada / plano / relatório-gerado), passado o prazo de 2h
function pendenciasAulaTurma(turmaId){
  const out=[]; const hojeY=hoje();
  const c=new Date(); c.setDate(c.getDate()-PEND_JANELA_DIAS); const corteY=ymd(c);
  datasAula(turmaId, Math.ceil(PEND_JANELA_DIAS/7)+1, 0).forEach(data=>{
    if(data<corteY || data>hojeY) return;
    if(data<PEND_INICIO) return;   // aulas anteriores ao início não geram pendência
    if(_emRecessoISO(data) || _emFeriasFixas(data)) return;   // dia dentro de recesso/férias não gera pendência
    const _rd=S.presencas.find(p=>p.turmaId===turmaId && p.data===data);
    if(_rd && (_rd.statusAula==='cancelada'||_rd.statusAula==='transferida')) return;  // aula cancelada/transferida não gera pendência
    const nivel=_nivelPend(_fimAulaTs(turmaId,data));
    if(!nivel) return;
    const presOk = S.presencas.some(p=>p.turmaId===turmaId && p.data===data && p.fechada);
    const _transf= !!(_rd && _rd.planoTransferido);   // plano transferido p/ próxima aula: não cobra plano/relatório nesta data
    const planoOk= _transf || S.planos.some(p=>p.turmaId===turmaId && p.data===data && p.realizado);
    const relOk  = _transf || S.relatorios.some(r=>r.turmaId===turmaId && r.data===data);
    if(!presOk)  out.push({turmaId,data,tipo:'chamada',  nivel,fimTs:_fimAulaTs(turmaId,data)});
    if(!planoOk) out.push({turmaId,data,tipo:'plano',    nivel,fimTs:_fimAulaTs(turmaId,data)});
    if(!relOk)   out.push({turmaId,data,tipo:'relatorio',nivel,fimTs:_fimAulaTs(turmaId,data)});
  });
  return out;
}
// relatórios gerados e ainda não enviados (passo da secretaria; escala p/ direção após 24h)
function pendenciasEnviarTurma(turmaId){
  return S.relatorios.filter(r=>r.turmaId===turmaId && !r.enviado && !(_emRecessoISO(r.data)||_emFeriasFixas(r.data))).map(r=>{
    const ts=r.atualizadoEm||_ymdToTs(r.criadoEm);
    return {turmaId, data:r.data, tipo:'enviar', relId:r.id, fimTs:ts, nivel:(Date.now()-ts>=PEND_PRAZO_SECR)?'dir':'sec'};
  });
}
function _souProfDaTurma(t){ return _normTxt((t&&t.professor)||'')===_normTxt(S.usuario||''); }
function _meuEnsina(){ const u=(S.usuarios||[]).find(x=>x.nome===S.usuario); return (u&&u.ensina)||''; }   // nome "de ensino" do professor logado
// o que o perfil atual deve ver para uma turma
function pendenciasDaTurmaParaMim(turmaId){
  const t=S.turmas.find(x=>x.id===turmaId); if(!t||t.arquivada) return [];
  if(S.perfil==='professor')  return _souProfDaTurma(t)? pendenciasAulaTurma(turmaId):[];
  if(S.perfil==='direcao'){    // escaladas (+24h): aula (professor) + envio pendente (secretaria)
    const corte=ymd(new Date(Date.now()-PEND_JANELA_DIAS*864e5));
    const aula=pendenciasAulaTurma(turmaId).filter(p=>p.nivel==='dir');
    const env =pendenciasEnviarTurma(turmaId).filter(p=>p.nivel==='dir' && p.data>=corte && p.data>=PEND_INICIO);
    return aula.concat(env);
  }
  return [];   // secretaria: o passo de "enviar" já aparece em "Relatórios para enviar"
}
function todasMinhasPendencias(){
  let out=[]; S.turmas.forEach(t=>{ if(!t.arquivada) out=out.concat(pendenciasDaTurmaParaMim(t.id)); }); return out;
}
// atalho: leva direto pra onde resolve a pendência
function irPendencia(turmaId,data,tipo){
  painelTurma=turmaId; presTurma=matTurma=temaTurma=testeTurma=relTurma=turmaId;
  if(tipo==='chamada'){ presData=data; ir('presenca'); }
  else if(tipo==='plano'){ ir('planos'); }
  else if(tipo==='relatorio'){ presData=data; ir('relatorio'); }
  else { ir('alertas'); }
  if(typeof fechar==='function') fechar();
}
// quem é o responsável por resolver uma pendência (para agrupar a visão da direção)
function _responsavelPend(p){
  if(p.tipo==='enviar') return 'Secretaria';
  const t=S.turmas.find(x=>x.id===p.turmaId)||{};
  return (t.professor && String(t.professor).trim()) ? String(t.professor).trim() : '(sem professor)';
}
// card de pendências (usado no Painel e nos Avisos)
function renderPendenciasCard(){
  const ps=todasMinhasPendencias(); if(!ps.length) return '';
  const temDir=ps.some(p=>p.nivel==='dir');
  let blocos;
  if(S.perfil==='direcao'){
    // agrupado por RESPONSÁVEL (cada professor + a secretaria)
    const porResp={}; ps.forEach(p=>{ const r=_responsavelPend(p); (porResp[r]=porResp[r]||[]).push(p); });
    const chaves=Object.keys(porResp).filter(k=>k!=='Secretaria').sort((a,b)=>a.localeCompare(b));
    if(porResp['Secretaria']) chaves.push('Secretaria');   // secretaria sempre por último
    blocos=chaves.map(resp=>{
      const icone = resp==='Secretaria' ? '🗂️' : '👩‍🏫';
      const linhas=porResp[resp].sort((a,b)=>b.fimTs-a.fimTs).map(p=>{
        const tagDir=(p.nivel==='dir')?' <span class="pill" style="background:#fdeaea;color:var(--vermelho)">⏱ +24h</span>':'';
        return `<div class="check"><span style="flex:1">${brDate(p.data)} · ${esc(turmaNome(p.turmaId))} · <b>${PEND_ROTULO[p.tipo]}</b>${tagDir}</span>
          <button class="btn ghost sm" onclick="irPendencia('${p.turmaId}','${p.data}','${p.tipo}')">resolver ›</button></div>`;
      }).join('');
      return `<div style="margin-top:12px"><div style="font-weight:600">${icone} ${esc(resp)}</div>${linhas}</div>`;
    }).join('');
  } else {
    // professor: agrupado por turma (comportamento original)
    const porTurma={}; ps.forEach(p=>{ (porTurma[p.turmaId]=porTurma[p.turmaId]||[]).push(p); });
    blocos=Object.keys(porTurma).map(tid=>{
      const t=S.turmas.find(x=>x.id===tid)||{};
      const linhas=porTurma[tid].sort((a,b)=>b.fimTs-a.fimTs).map(p=>{
        const tagDir=(p.nivel==='dir')?' <span class="pill" style="background:#fdeaea;color:var(--vermelho)">⏱ +24h</span>':'';
        return `<div class="check"><span style="flex:1">${brDate(p.data)} · <b>${PEND_ROTULO[p.tipo]}</b>${tagDir}</span>
          <button class="btn ghost sm" onclick="irPendencia('${tid}','${p.data}','${p.tipo}')">resolver ›</button></div>`;
      }).join('');
      return `<div style="margin-top:10px"><div style="font-weight:600">${esc(t.nome||'—')}</div>${linhas}</div>`;
    }).join('');
  }
  const sub = S.perfil==='professor' ? 'Resolva o quanto antes — após 24h a direção é avisada.'
            : S.perfil==='secretaria' ? 'Relatórios aguardando envio aos pais.'
            : 'Organizadas por professor e secretaria. Inclui relatórios já gerados, aguardando envio às famílias.';
  return `<div class="card" style="border-left:4px solid ${temDir?'var(--vermelho)':'var(--laranja)'}">
    <h3>⚠️ ${ps.length} pendência(s)${S.perfil==='direcao'?' para a direção':''}</h3>
    <p class="hint">${sub}</p>${blocos}</div>`;
}
// banner compacto de pendências de UMA turma (usado no painel da turma)
function bannerPendTurma(id){
  const ps=pendenciasDaTurmaParaMim(id); if(!ps.length) return '';
  const linhas=ps.sort((a,b)=>b.fimTs-a.fimTs).map(p=>`<div class="check"><span style="flex:1">${brDate(p.data)} · <b>${PEND_ROTULO[p.tipo]}</b>${p.nivel==='dir'?' <span class="pill" style="background:#fdeaea;color:var(--vermelho)">⏱ +24h</span>':''}</span><button class="btn ghost sm" onclick="event.stopPropagation();irPendencia('${id}','${p.data}','${p.tipo}')">resolver ›</button></div>`).join('');

function presRec(criar){
  let rec=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData);
  if(!rec && criar){
    rec={id:uid(),turmaId:presTurma,data:presData,registros:{},atrasados:[],saiuCedo:[]};
    alunosDa(presTurma).forEach(a=>rec.registros[a.id]='presente');
    if(temAula2(presTurma)){ rec.registros2={}; alunosDa(presTurma).forEach(a=>rec.registros2[a.id]='presente'); }
    S.presencas.push(rec);
  } else if(rec && criar && temAula2(presTurma) && !rec.registros2){
    // turma 1x/semana sem aula 2 ainda: cria espelhando a aula 1 (mantém a contagem)
    rec.registros2={}; alunosDa(presTurma).forEach(a=>rec.registros2[a.id]=rec.registros[a.id]||'presente');
  }
  return rec;
}
function _aulaConta(p){ return !p.statusAula || p.statusAula==='normal'; }
function renderStatusAula(){
  const el=document.getElementById('pStatusAula'); if(!el) return;
  const recX=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData);

  if(soLeitura()){
    if(status==='cancelada'){ el.style.display=''; el.innerHTML=`<b style="color:var(--vermelho)">🚫 Aula cancelada</b> <span class="hint">· ${brDate(presData)}</span>`; }
    else if(status==='transferida'){ el.style.display=''; el.innerHTML=`<b style="color:var(--laranja)">↪ Aula transferida</b> <span class="hint">· para ${recX.transfData?brDate(recX.transfData):'—'}${recX.transfHora?(' às '+escAttr(recX.transfHora)):''}</span>`; }
    else { el.style.display='none'; }
    return;
  }
  el.style.display='';

  if(status==='transferida'){
    html+=`<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:flex-end">

function setStatusAula(status){
  if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  const rec=presRec(true);
  if(status==='normal'){ delete rec.statusAula; delete rec.transfData; delete rec.transfHora; }
  else { rec.statusAula=status; }
  rec.fechada=true; rec.atualizadoEm=Date.now();
  save(); montarNav(); renderPres();
  if(status==='cancelada') toast('Aula marcada como cancelada');
}
function salvarTransfer(){
  if(soLeitura())return;
  const rec=presRec(true);
  rec.statusAula='transferida';
  rec.transfData=(document.getElementById('trData')||{}).value||'';
  rec.transfHora=(document.getElementById('trHora')||{}).value||'';
  rec.fechada=true; rec.atualizadoEm=Date.now();
  save(); montarNav(); renderPres(); toast('Transferência registrada');
}
function renderPres(){
  renderStatusAula();
  const box=document.getElementById('pBox');
  const als=alunosDa(presTurma);
  const _recSt=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData);
  const _stA=(_recSt&&_recSt.statusAula)||'normal';
  if(_stA==='cancelada'||_stA==='transferida'){
    box.innerHTML = _stA==='cancelada'
      ? `<div style="text-align:center;padding:14px"><h3 style="margin:0;color:var(--vermelho)">🚫 Aula cancelada</h3><p class="hint" style="margin:6px 0 0">${brDate(presData)} — sem chamada, plano ou relatório nesta data.</p></div>`
      : `<div style="text-align:center;padding:14px"><h3 style="margin:0;color:var(--laranja)">↪ Aula transferida</h3><p class="hint" style="margin:6px 0 0">${brDate(presData)} → ${_recSt.transfData?brDate(_recSt.transfData):'(defina a data)'}${_recSt.transfHora?(' às '+escAttr(_recSt.transfHora)):''}</p></div>`;
    return;
  }
  if(!als.length){box.innerHTML='<div class="empty"><div class="big">👥</div>Nenhum aluno nesta turma ainda.</div>';return;}
  const rec=S.presencas.find(p=>p.turmaId===presTurma&&p.data===presData)||{registros:{},atrasados:[],saiuCedo:[]};
  const dois=temAula2(presTurma);
  const reg=rec.registros||{}, atr=rec.atrasados||[], cedo=rec.saiuCedo||[];
  // aula 2: se a turma é 1x/semana mas o registro ainda não tem aula 2, espelha a aula 1 (exibição)
  const reg2src = rec.registros2 || null;
  const st2De=(id)=> reg2src ? (reg2src[id]||'presente') : (reg[id]||'presente');
  const matRec=S.material.find(m=>m.turmaId===presTurma&&m.data===presData);
  const matFalt=matRec?matRec.faltantes:[];
  const temasHoje=S.temas.filter(t=>t.turmaId===presTurma && t.dataEntrega===presData);
  const entregasAula=temasEntregaDaAula(presTurma,presData);
  const travada = (rec.fechada && !presEditando) || soLeitura();
  const faltaTag='<span style="color:var(--vermelho);font-weight:600">Falta</span>';
  const presTag='<span style="color:var(--ok);font-weight:600">Presente</span>';

  // ----- MODO TRAVADO -----
  if(travada){
    const linhas=als.map(a=>{
      const s1=reg[a.id]||'presente', s2=st2De(a.id);
      const tmt=entregasAula.filter(e=>e.aids.includes(a.id)).map(e=>{const s=e.tema.entregas[a.id];return s==='atrasado'?('⏰ tema atrasado (entrega '+brDate(e.entregaEra)+')'):'📚 '+(s===true?'tema feito':s==='parcial'?'tema parcial':'tema não feito');});
      const extra=[];
      if(atr.includes(a.id))extra.push('chegou atrasado');
      if(cedo.includes(a.id))extra.push('saiu mais cedo');
      if(matFalt.includes(a.id))extra.push('🎒 sem material');
      let status;
      if(dois){ status=`Aula 1: ${s1==='falta'?faltaTag:presTag} · Aula 2: ${s2==='falta'?faltaTag:presTag}`+(extra.length?' · '+extra.join(' · '):''); }
      else if(s1==='falta'){ status=faltaTag; }
      else { status=presTag+(extra.length?' · '+extra.join(' · '):''); }
      return `<div style="padding:8px 0;border-bottom:1px dashed var(--linha)"><b>${a.nome}</b> — ${status}${tmt.length?`<div class="hint" style="margin-top:2px">${tmt.join(' · ')}</div>`:''}</div>`;
    }).join('');
    const nf= dois
      ? als.reduce((n,a)=>n+((reg[a.id]||'presente')==='falta'?1:0)+(st2De(a.id)==='falta'?1:0),0)
      : als.filter(a=>(reg[a.id]||'presente')==='falta').length;
    box.innerHTML=`<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="flex:1;min-width:150px"><h3 style="margin:0;color:var(--ok)">✅ Chamada salva</h3><p class="hint" style="margin:2px 0 0">${brDate(presData)} · ${als.length} aluno(s) · ${nf} falta(s)${dois?' (2 aulas no dia)':''}</p></div>
        ${soLeitura()?'':`<button class="btn" onclick="editarChamada()">✏️ Editar chamada</button>`}
      </div>
      <div style="margin-top:12px">${linhas}</div>`;
    return;
  }

  // ----- MODO EDIÇÃO -----
  const temaCtrl=(a)=> entregasAula.filter(e=>e.aids.includes(a.id)).map(e=>{
    const t=e.tema, st=t.entregas[a.id], atras=st==='atrasado';
    const tag=atras?`<span class="pill" style="background:#fff0e6;color:var(--laranja)">⏰ atrasado · entrega era ${brDate(e.entregaEra)}</span>`:(e.atrasada?`<span class="pill">entrega ${brDate(e.entregaEra)}</span>`:'');
    return `<div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap${atras?';background:#fff7f0;border:1px solid #ffd9b8;border-radius:10px;padding:8px':''}">
      <span style="font-size:.82rem;flex:1;min-width:120px;color:${atras?'var(--laranja)':'var(--rosa)'}">📚 ${escAttr(t.descricao)} ${tag}</span>
      <div class="seg"><button class="${st===true?'on-ok':''}" onclick="setTemaChamada('${t.id}','${a.id}',true)">feito</button>
      <button class="${st==='parcial'?'on-mid':''}" onclick="setTemaChamada('${t.id}','${a.id}','parcial')">parcial</button>
      <button class="${st===false?'on-no':''}" onclick="setTemaChamada('${t.id}','${a.id}',false)">não feito</button></div>
    </div>`;}).join('');
  const segAula=(a,aula)=>{ const cur= aula===2 ? st2De(a.id) : (reg[a.id]||'presente'); const fn= aula===2?'setPres2':'setPres';
    return `<div class="seg"><button class="${cur==='presente'?'on-p':''}" onclick="${fn}('${a.id}','presente')">Presente</button><button class="${cur==='falta'?'on-f':''}" onclick="${fn}('${a.id}','falta')">Falta</button></div>`; };
  box.innerHTML=`<h3>${als.length} alunos · ${brDate(presData)}</h3><p class="hint">Toque para alternar presença. ${dois?'Esta turma tem <b>2 aulas no mesmo dia</b> — marque Aula 1 e Aula 2 separadamente. ':''}Marque atraso, saída antecipada, <b>sem material</b> e a entrega do <b>tema</b> em cada aluno. Ao terminar, clique em <b>Salvar</b>.</p>
    ${als.map(a=>{
      const st=reg[a.id]||'presente', st2=st2De(a.id);
      const presenteAlgum = dois ? (st==='presente'||st2==='presente') : (st==='presente');
      const controles = dois
        ? `<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
             <div style="display:flex;align-items:center;gap:8px"><span class="hint" style="min-width:44px">Aula 1</span>${segAula(a,1)}</div>
             <div style="display:flex;align-items:center;gap:8px"><span class="hint" style="min-width:44px">Aula 2</span>${segAula(a,2)}</div>
           </div>`
        : segAula(a,1);
      return `<div style="padding:10px 0;border-bottom:1px dashed var(--linha)">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <b style="flex:1;min-width:130px">${a.nome}</b>
          ${controles}
        </div>
        ${presenteAlgum?`<div style="display:flex;gap:18px;margin-top:8px;flex-wrap:wrap">
          <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer"><input type="checkbox" ${atr.includes(a.id)?'checked':''} onchange="toggleAtraso('${a.id}')"> chegou atrasado</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer"><input type="checkbox" ${cedo.includes(a.id)?'checked':''} onchange="toggleSaiuCedo('${a.id}')"> saiu mais cedo</label>
          <label style="display:flex;align-items:center;gap:6px;font-size:.84rem;cursor:pointer;color:var(--laranja)"><input type="checkbox" ${matFalt.includes(a.id)?'checked':''} onchange="toggleMatPres('${a.id}')"> 🎒 sem material</label>
        </div>`:''}
        ${temaCtrl(a)}
      </div>`;
    }).join('')}
    <div style="margin-top:16px"><button class="btn" onclick="salvarPres()">${rec.fechada?'Salvar alterações':'Salvar chamada e material'}</button></div>`;
}
function matRecPres(criar){
  let rec=S.material.find(m=>m.turmaId===presTurma&&m.data===presData);
  if(!rec && criar){ rec={id:uid(),turmaId:presTurma,data:presData,faltantes:[]}; S.material.push(rec); }

function toggleMatPres(aid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');

function _limparExtrasSeAusente(rec,id){
  const dois=temAula2(presTurma);
  const f1=rec.registros[id]==='falta';
  const f2=dois?((rec.registros2||{})[id]==='falta'):f1;
  if(dois?(f1&&f2):f1){
    rec.atrasados=(rec.atrasados||[]).filter(x=>x!==id);
    rec.saiuCedo=(rec.saiuCedo||[]).filter(x=>x!==id);
    const mr=S.material.find(m=>m.turmaId===presTurma&&m.data===presData); if(mr) mr.faltantes=mr.faltantes.filter(x=>x!==id);
  }
}
function setPres(id,st){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');

function setPres2(id,st){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');

function toggleAtraso(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const rec=presRec(true);rec.atrasados=rec.atrasados||[];const i=rec.atrasados.indexOf(id);if(i>=0)rec.atrasados.splice(i,1);else rec.atrasados.push(id);renderPres();}
function toggleSaiuCedo(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const rec=presRec(true);rec.saiuCedo=rec.saiuCedo||[];const i=rec.saiuCedo.indexOf(id);if(i>=0)rec.saiuCedo.splice(i,1);else rec.saiuCedo.push(id);renderPres();}
function salvarPres(){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  const rec=presRec(true);          // garante o registro (alunos sem marcação ficam 'presente')
  rec.fechada=true; rec.atualizadoEm=Date.now(); presEditando=false;

}

function esc(s){return (s==null?'':s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function modalTema(turmaId,descricao,data,origem){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');

function criarTema(turmaId,origem){
  const desc=document.getElementById('mtDesc').value.trim();
  if(!desc)return toast('Descreva o tema');
  const data=document.getElementById('mtOrig').value||hoje();
  const entrega=(document.getElementById('mtEntrega')||{}).value||proximaEntrega(turmaId,data);
  let alvos;
  if(document.getElementById('mtAlvo').value==='alguns'){
    alvos=[...document.querySelectorAll('.mtChk:checked')].map(c=>c.value);
    if(!alvos.length)return toast('Selecione ao menos um aluno');
  }else{
    alvos=alunosDa(turmaId).map(a=>a.id);
  }
  const ent={}; alvos.forEach(id=>ent[id]=true);   // padrão: todos entregaram (marca-se quem NÃO entregou)
  const id=uid();
  S.temas.push({id,turmaId,data,dataEntrega:entrega,descricao:desc,entregas:ent,origem:origem||'extra'});
  if(origem==='plano' && _temaPlanoRef){
    const p=S.planos.find(x=>x.id===_temaPlanoRef.pid);
    if(p && p.itens[_temaPlanoRef.i]){ p.itens[_temaPlanoRef.i].virouTema=true; p.itens[_temaPlanoRef.i].temaId=id; }
  }
  _temaPlanoRef=null;
  save(); fechar(); toast('Tema de casa criado');
  if(rota==='temas'){ temaTurma=turmaId; VIEWS.temas(); }
  else if(rota==='planos'){ renderPlanos(); }
  else if(rota==='presenca'){ renderTemaChamada(); }
}

function temaDoPlano(pid,i){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas'); const p=S.planos.find(p=>p.id===pid); if(!p)return; _temaPlanoRef={pid,i}; modalTema(p.turmaId,p.itens[i].txt,p.data,'plano'); }
function desfazerTemaDoPlano(pid,i){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');
  const p=S.planos.find(p=>p.id===pid); if(!p||!p.itens[i])return;
  if(!confirm('Desfazer o tema deste item? O item volta a fazer parte do plano e o tema criado é apagado.'))return;
  const it=p.itens[i];
  if(it.temaId){ S.temas=S.temas.filter(t=>t.id!==it.temaId); marcarExcluido('temas',it.temaId); }
  it.virouTema=false; delete it.temaId;
  save(); renderPlanos(); toast('Tema desfeito — item voltou ao plano');
}
function temaExtraDoPlano(pid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas'); const p=S.planos.find(p=>p.id===pid); if(!p)return; _temaPlanoRef=null; modalTema(p.turmaId,'',p.data,'extra'); }
function renderTemas(){

function refreshTemaCtx(){ if(document.getElementById('tList')) renderTemas(); else if(document.getElementById('pTema')) renderTemaChamada(); else if(document.getElementById('plList')) renderPlanos(); }
function faltouNoDia(rec, aid){
  if(!rec) return false;
  const s1=(rec.registros||{})[aid]||'presente';
  if(rec.registros2){ const s2=rec.registros2[aid]||'presente'; return s1==='falta' && s2==='falta'; }
  return s1==='falta';
}
// Entregas de tema que devem aparecer numa aula com data `dataAula`:
//  - temas com entrega NESTE dia (todos os alunos do tema)
//  - temas de entrega passada com alunos marcados 'atrasado' (só esses, como pendência que segue até resolver)
function temasEntregaDaAula(turmaId, dataAula){
  const res=[];
  S.temas.filter(t=>t.turmaId===turmaId).forEach(t=>{
    const ent=t.dataEntrega||t.data;
    if(ent===dataAula){ const aids=Object.keys(t.entregas||{}); if(aids.length) res.push({tema:t,aids,entregaEra:ent,atrasada:false}); }
    else if(ent<dataAula){ const aids=Object.keys(t.entregas||{}).filter(aid=>t.entregas[aid]==='atrasado'); if(aids.length) res.push({tema:t,aids,entregaEra:ent,atrasada:true}); }
  });
  return res;
}

function todosEntregaram(tid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const t=S.temas.find(t=>t.id===tid);if(!t)return;Object.keys(t.entregas).forEach(k=>t.entregas[k]=true);save();refreshTemaCtx();toast('Todos marcados como feito');}
function delTema(id){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');if(confirm('Remover este tema de casa?')){S.temas=S.temas.filter(t=>t.id!==id);marcarExcluido('temas',id);save();refreshTemaCtx();toast('Tema removido');}}

const SKILLS=['Grammar','Vocabulary','Listening','Reading','Writing','Speaking'];
function cefrFromNome(nome){ const m=(nome||'').toUpperCase().match(/\b([ABC][12]\+?)\b/); return m?m[1]:''; }
function cefrRank(c){ const o=['A1','A1+','A2','A2+','B1','B1+','B2','B2+','C1','C1+','C2']; const i=o.indexOf((c||'').toUpperCase()); return i<0?-1:i; }
function numTestes(turma){
  if(!turma) return 3;
  if(turma.nivel==='kids') return 0;                 // KIDS: sem teste formal
  if(cefrRank(turma.cefr)>=cefrRank('B2')) return 2;  // B2, B2+, C1, C2 → 2 testes
  return 3;                                           // júnior, teens até B1+, demais → 3 testes
}
function bandaConceito(n){
  if(n===''||n==null||isNaN(n)) return {label:'—',cor:'#9aa6b6',bg:'transparent'};
  n=+n;
  if(n>=90) return {label:'merit',cor:'var(--azul)',bg:'#E7F0FB'};       // 90–100 merit (azul)
  if(n>=60) return {label:'pass',cor:'var(--ok)',bg:'#E6F6F0'};          // 60–89 pass (verde)
  return {label:'in need of improvement',cor:'var(--vermelho)',bg:'#FDECEC'}; // 0–59 (vermelho)
}
const DIST_COR='#B8860B', DIST_BG='#FBF3D6';
function legendaConceitos(){
  const it=(c,t)=>`<span style="display:inline-flex;align-items:center;gap:5px;font-size:.76rem;margin:0 10px 4px 0"><span style="width:12px;height:12px;border-radius:3px;background:${c};display:inline-block"></span>${t}</span>`;
  return `<div style="display:flex;flex-wrap:wrap;align-items:center;margin-top:4px">${it('var(--vermelho)','0–59 in need of improvement')}${it('var(--ok)','60–89 pass')}${it('var(--azul)','90–100 merit')}${it(DIST_COR,'★ distinction (acima do nível, sem nota)')}</div>`;
}
function testeDaTurma(turmaId,numero,criar){
  let t=S.testes.find(x=>x.turmaId===turmaId && x.numero===numero);
  if(!t && criar){ t={id:uid(),turmaId,numero,data:hoje(),notas:{}}; S.testes.push(t); }
  return t;
}
function notaSkill(t,aid,skill){ return (t&&t.notas&&t.notas[aid]&&t.notas[aid][skill]!=null)?t.notas[aid][skill]:''; }
function mediaTesteAluno(t,aid){
  if(!t||!t.notas||!t.notas[aid]) return null;
  const v=SKILLS.map(s=>t.notas[aid][s]).filter(x=>x!==''&&x!=null&&!isNaN(x)).map(Number);
  return v.length?v.reduce((a,n)=>a+n,0)/v.length:null;
}
function mediaSkillAno(turmaId,aid,skill){
  const v=S.testes.filter(t=>t.turmaId===turmaId).map(t=>t.notas&&t.notas[aid]?t.notas[aid][skill]:'').filter(x=>x!==''&&x!=null&&!isNaN(x)).map(Number);
  return v.length?Math.round(v.reduce((a,n)=>a+n,0)/v.length):null;
}
function boletimDe(turmaId,aid,criar){
  let b=S.boletins.find(x=>x.turmaId===turmaId && x.alunoId===aid);
  if(!b && criar){ b={id:uid(),turmaId,alunoId:aid,ano:new Date().getFullYear(),conceitos:{},distincao:{},distincaoGeral:false,parecer:'',conceitoGeral:'',criadoEm:hoje(),criadoPor:S.usuario}; S.boletins.push(b); }
  if(b) b.distincao=b.distincao||{};
  return b;
}

          return `<td style="padding:2px 3px"><input type="number" min="0" max="100" value="${val}" ${soLeitura()?'disabled':''} onchange="setTesteNota(${num},'${a.id}','${s}',this)" style="width:48px;text-align:center;background:${b.bg};color:${b.cor};font-weight:600;border-radius:8px;padding:6px 2px"></td>`; }).join('')}
        <td id="tm_${num}_${a.id}" style="text-align:center;font-weight:700;color:${mb.cor}">${m==null?'—':Math.round(m)}</td></tr>`;
    }).join('');

function mediaConceitosBoletim(){

function _setDocIframe(fr, html){
  if(!fr) return;
  try{
    if(fr._docUrl){ URL.revokeObjectURL(fr._docUrl); fr._docUrl=null; }
    const blob=new Blob([html],{type:'text/html;charset=utf-8'});
    fr._docUrl=URL.createObjectURL(blob);
    fr.removeAttribute('srcdoc');
    fr.src=fr._docUrl;
  }catch(e){ try{ fr.srcdoc=html; }catch(_){ } }
  fr.style.display='block';
}
function gerarBoletim(){
  if(!boletimAluno) return toast('Escolha o aluno');
  const r=montarBoletimHTML(testeTurma, boletimAluno);
  _boletimHTML=r.html; _boletimTxt=r.txt;
  const fr=document.getElementById('boFrame'), vz=document.getElementById('boVazio');
  _setDocIframe(fr, r.html);
  if(vz) vz.style.display='none';
}

  f.style.cssText='position:fixed;left:-10000px;top:0;width:794px;height:1123px;border:0';
  document.body.appendChild(f);

  const go=()=>{ if(feito)return; feito=true; try{ f.contentWindow.focus(); f.contentWindow.print(); }catch(e){ toast('Não consegui abrir a impressão'); } };
  const d=f.contentWindow.document; d.open(); d.write(html); d.close();
  f.onload=()=>setTimeout(go,450);
  setTimeout(go,1200); // garantia caso o onload não dispare
}

              <div class="seg"><button class="${st===true?'on-ok':''}" onclick="setTema('${t.id}','${aid}',true)">feito</button>

function renderPlanos(){
  const list=document.getElementById('plList');
  const raw=(_buscaPlano||'').trim(), q=_normTxt(raw);
  const base=(painelTurma?S.planos.filter(p=>p.turmaId===painelTurma):[...S.planos]);
  if(q){
    const ps=base.filter(p=> _normTxt(p.titulo).includes(q) || _normTxt(p.conteudo||'').includes(q) || _normTxt(turmaNome(p.turmaId)).includes(q) || p.data.includes(raw) || brDate(p.data).includes(raw)).sort((a,b)=>b.data.localeCompare(a.data));
    list.innerHTML = ps.length ? ps.map(planoCard).join('') : `<div class="card empty"><div class="big">🔎</div>Nenhum plano encontrado.</div>`;
    return;
  }
  const pend=base.filter(p=>!p.realizado).sort((a,b)=>a.data.localeCompare(b.data));
  const feitos=base.filter(p=>p.realizado).sort((a,b)=>b.data.localeCompare(a.data));
  if(!pend.length && !feitos.length){ list.innerHTML=`<div class="card empty"><div class="big">✅</div>Nenhum plano de aula ainda. Crie um novo no botão acima.</div>`; return; }
  let html=`<p style="font-weight:700;margin:4px 0 8px;opacity:.7">⏳ Pendentes (${pend.length})</p>`;
  html += pend.length ? pend.map(planoCard).join('') : '<p class="hint" style="margin:0 0 8px">Nenhum plano pendente.</p>';
  html += `<p style="font-weight:700;margin:20px 0 8px;opacity:.7">✓ Realizados (${feitos.length})</p>`;
  html += feitos.length ? feitos.map(planoCard).join('') : '<p class="hint" style="margin:0">Nenhum plano realizado ainda.</p>';
  list.innerHTML=html;
}
function marcarPlanoFeito(pid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const p=S.planos.find(p=>p.id===pid);if(!p)return;p.realizado=true;p.realizadoEm=hoje();p.atualizadoEm=Date.now();save();renderPlanos();toast('Plano marcado como feito');}
function gerarRelatorioDoPlano(pid){
  const p=S.planos.find(x=>x.id===pid); if(!p)return;
  upsertRelatorio(p.turmaId,p.data,corpoRelatorioDia(p.turmaId,p.data));
  save(); toast('Relatório gerado — veja em Avisos');
}
function transferirPlanoProximaAula(pid){
  if(soLeitura())return toast('Somente leitura — a secretaria não edita planos');
  const p=S.planos.find(p=>p.id===pid); if(!p)return;
  if(p.realizado)return toast('Este plano já foi marcado como realizado');
  const t=S.turmas.find(x=>x.id===p.turmaId);
  if(!t||!t.dias||!t.dias.length)return toast('Defina os dias de aula da turma para poder transferir');
  const origem=p.data;
  const prox=proximaEntrega(p.turmaId,origem);
  if(!prox||prox<=origem)return toast('Não encontrei uma próxima data de aula para esta turma');
  if(!confirm('Transferir este plano para a próxima aula?\n\nDe '+brDate(origem)+'  →  para '+brDate(prox)+'\n\nA aula de '+brDate(origem)+' continua valendo (as faltas ficam registradas), mas o plano passa para a próxima data — sem gerar relatório nem cobrança para aquele dia.'))return;
  let rec=S.presencas.find(x=>x.turmaId===p.turmaId && x.data===origem);
  if(!rec){ rec={id:uid(),turmaId:p.turmaId,data:origem,registros:{},fechada:false,atualizadoEm:Date.now()}; S.presencas.push(rec); }
  rec.planoTransferido=true; rec.planoTransferidoPara=prox; rec.atualizadoEm=Date.now();
  p.transferidoDe=origem; p.data=prox; p.atualizadoEm=Date.now();
  save(); montarNav(); if(typeof renderPlanos==='function') renderPlanos();
  toast('Plano transferido para '+brDate(prox));
}
function reabrirPlano(pid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const p=S.planos.find(p=>p.id===pid);if(!p)return;p.realizado=false;p.realizadoEm=null;p.atualizadoEm=Date.now();save();renderPlanos();toast('Plano reaberto');}
function togglePlano(pid,i){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const p=S.planos.find(p=>p.id===pid);p.itens[i].done=!p.itens[i].done;p.atualizadoEm=Date.now();save();renderPlanos();}
function setPlanoCampo(pid,campo,val){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');const p=S.planos.find(p=>p.id===pid);p[campo]=val;save();}
function delPlano(pid){if(soLeitura())return toast('Somente leitura — a secretaria não edita turmas');if(ehProfessor())return toast('Sem permissão');if(confirm('Excluir este plano?')){S.planos=S.planos.filter(p=>p.id!==pid);marcarExcluido('planos',pid);save();renderPlanos();toast('Plano excluído');}}
function editarPlano(id){
  const p=S.planos.find(x=>x.id===id); if(!p)return;
  modal(`<h3>✏️ Editar plano <button class="close" onclick="fechar()">×</button></h3>

    <div class="field"><label class="lbl">Anotações</label><textarea id="epNotas">${escAttr(p.anotacoes||'')}</textarea></div>
    <button class="btn block" onclick="salvarEdicaoPlano('${id}')">Salvar alterações</button>`);
}
function salvarEdicaoPlano(id){
  const p=S.planos.find(x=>x.id===id); if(!p)return;
  const tit=document.getElementById('epTit').value.trim(); if(!tit)return toast('Dê um título');
  const antigos={}; (p.itens||[]).forEach(i=>antigos[i.txt]=i.done);

function corpoRelatorioDia(turmaId,dataAula){
  const turma=S.turmas.find(t=>t.id===turmaId)||{};
  const planos=S.planos.filter(p=>p.turmaId===turmaId && p.data===dataAula);
  const materia=planos.map(p=>p.conteudo||p.titulo).filter(Boolean).join(' · ');
  const feitos=[].concat(...planos.map(p=>(p.itens||[]).filter(i=>i.done).map(i=>i.txt)));
  const temas=S.temas.filter(t=>t.turmaId===turmaId && t.data===dataAula);
  const anota=planos.map(p=>p.anotacoes).filter(Boolean).join(' ');
  let b=`Olá, famílias! 👋\n\nResumo da aula de ${brDate(dataAula)} — turma ${turma.nome}.\n\n`;
  b+=`📖 Matéria do dia: ${materia||'(registrar no plano de aula)'}\n`;
  if(feitos.length) b+=`✅ Trabalhamos: ${feitos.join(', ')}.\n`;
  if(temas.length){ b+=`\n📚 Tema de casa:\n`+temas.map(t=>`• ${t.descricao}${t.dataEntrega?` (entrega ${brDate(t.dataEntrega)})`:''}`).join('\n')+`\n`; }
  else { b+=`\n📚 Tema de casa: sem tema para esta aula\n`; }
  if(anota) b+=`\n📝 Observações: ${anota}\n`;
  b+=`\n${(S.config&&S.config.assinatura)||ASSINATURA_PADRAO}`;
  return b;
}

function copiarTexto(txt, msg){
  txt=String(txt||'');
  if(!txt) return toast('Nada para copiar');
  const ok=()=>toast(msg||'Copiado!');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok, ()=>fallbackCopia(txt,msg));
  } else { fallbackCopia(txt,msg); }
}
function fallbackCopia(txt,msg){
  try{
    const ta=document.createElement('textarea');
    ta.value=txt; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.top='-1000px'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select(); ta.setSelectionRange(0, txt.length);
    const sucesso=document.execCommand('copy');
    document.body.removeChild(ta);
    toast(sucesso ? (msg||'Copiado!') : 'Não foi possível copiar — selecione manualmente');
  }catch(e){ toast('Não foi possível copiar — selecione manualmente'); }
}
