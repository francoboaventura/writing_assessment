name = "togethere-writing"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Permite importar o prompt do motor como texto:
#   import SYSTEM_PROMPT_A2 from "../../motor/prompt_a2.md"
# O prompt vive em motor/ e é a fonte da verdade — o Worker não tem cópia dele.
rules = [
  { type = "Text", globs = ["**/*.md"], fallthrough = true }
]

[vars]
# Domínios autorizados a chamar a API. Troque pelo seu GitHub Pages.
# Vírgula separa vários. "*" libera geral — use só em teste.
ALLOWED_ORIGINS = "https://francoboaventura.github.io"

# Segredo (nunca no toml, nunca no git):
#   npx wrangler secret put ANTHROPIC_API_KEY
